<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Punkt</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=JetBrains+Mono:wght@300&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: #0a0908;
    color: #e8e4dc;
    font-family: 'EB Garamond', Georgia, serif;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.55) 100%);
    z-index: 5;
  }

  #back-btn {
    position: fixed;
    top: 0.75rem;
    left: 0.75rem;
    z-index: 9998;
    background: rgba(0,0,0,0.5);
    color: #fff;
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 8px;
    padding: 0.4rem 0.75rem;
    font-size: 0.85rem;
    cursor: pointer;
    text-decoration: none;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
  }
  #back-btn:hover { background: rgba(0,0,0,0.75); }

  /* Stage */
  #stage {
    position: fixed; inset: 0;
  }
  #scene {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    transition: opacity 0.9s ease;
    padding: 6rem 1rem 5rem;
  }
  #scene.fading { opacity: 0; }

  /* Title screen */
  #title-screen {
    position: fixed; inset: 0; z-index: 100;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 1.6rem; background: #0a0908;
    transition: opacity 0.7s ease;
    padding: 2rem;
  }
  #title-screen.hidden { opacity: 0; pointer-events: none; }
  .big-dot {
    width: 18px; height: 18px; border-radius: 50%;
    background: #f8f3e8;
    box-shadow: 0 0 18px rgba(248,243,232,0.85), 0 0 50px rgba(248,243,232,0.35);
    animation: pulse 3.4s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 0.95; }
    50% { transform: scale(1.18); opacity: 0.65; }
  }
  #title-screen h1 {
    font-size: 1.4rem;
    font-weight: 400;
    letter-spacing: 0.55em;
    padding-left: 0.55em;
    color: #e8e4dc;
  }
  .hr {
    width: 56px; height: 1px;
    background: rgba(232,228,220,0.3);
  }
  .subtitle {
    font-style: italic; opacity: 0.55;
    max-width: 80%; text-align: center; line-height: 1.7;
    font-size: 1.05rem;
  }
  .credit {
    position: fixed;
    bottom: 1rem; left: 0; right: 0;
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.4em;
    opacity: 0.25;
    text-transform: uppercase;
  }

  /* Buttons */
  .btn {
    background: transparent;
    color: #e8e4dc;
    border: 1px solid rgba(232,228,220,0.35);
    border-radius: 0;
    padding: 0.7rem 2.2rem;
    font-size: 0.9rem;
    font-family: inherit;
    letter-spacing: 0.35em;
    text-indent: 0.35em;
    cursor: pointer;
    text-transform: uppercase;
    transition: background 0.3s, border-color 0.3s;
  }
  .btn:hover, .btn:active {
    background: rgba(232,228,220,0.08);
    border-color: rgba(232,228,220,0.6);
  }

  /* Targets are invisible markers */
  [data-target] { pointer-events: none; }

  /* Scene content */
  .level-svg {
    max-width: 92vw; max-height: 65vh;
    height: auto; width: auto;
  }
  .stroke { stroke: #e8e4dc; fill: none; }
  .ghost { opacity: 0.32; stroke-dasharray: 2 4; }
  .star { fill: #e8e4dc; stroke: none; }
  .filled { fill: #e8e4dc; stroke: none; }

  .sentence-level {
    font-size: clamp(2.4rem, 11vw, 4.2rem);
    letter-spacing: 0.02em;
    white-space: nowrap;
    position: relative;
  }
  .sentence-level [data-target] {
    display: inline-block;
    width: 0.55em;
    height: 1.2em;
    vertical-align: bottom;
    margin-left: 0.04em;
  }

  .pause-text {
    font-size: clamp(1.5rem, 6.5vw, 2.4rem);
    line-height: 1.7;
    text-align: center;
    max-width: 90%;
    font-style: italic;
    position: relative;
  }
  .pause-text .gap {
    display: inline-block;
    width: 2.4em;
    height: 0.07em;
    background: rgba(232,228,220,0.25);
    margin: 0 0.25em;
    vertical-align: middle;
    position: relative;
  }
  .pause-text .gap [data-target] {
    position: absolute;
    width: 1px; height: 1px;
    top: 50%; left: 50%;
  }

  .blank-message {
    color: rgba(232,228,220,0.55);
    font-style: italic;
    font-size: 1rem;
    text-align: center;
    line-height: 1.8;
  }

  /* The dot — placed by user */
  .dot {
    position: fixed;
    width: 14px; height: 14px;
    background: #f8f3e8;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    box-shadow: 0 0 14px rgba(248,243,232,0.85), 0 0 30px rgba(248,243,232,0.45);
    z-index: 50;
  }
  .dot.miss { animation: missAnim 1.6s ease-out forwards; }
  .dot.hit { animation: hitAnim 1.5s ease-out forwards; }
  @keyframes missAnim {
    0%   { transform: translate(-50%, -50%) scale(1); opacity: 1; background: #f8f3e8;
           box-shadow: 0 0 14px rgba(248,243,232,0.8); }
    20%  { transform: translate(-50%, -50%) scale(1.4); background: #d05a47;
           box-shadow: 0 0 28px rgba(208,90,71,0.95); }
    100% { transform: translate(-50%, calc(-50% + 90px)) scale(0.4);
           opacity: 0; background: #6a2a23; }
  }
  @keyframes hitAnim {
    0%   { transform: translate(-50%, -50%) scale(1); opacity: 1; }
    35%  { transform: translate(-50%, -50%) scale(1.7);
           box-shadow: 0 0 36px rgba(248,243,232,1), 0 0 90px rgba(248,243,232,0.5); }
    100% { transform: translate(-50%, -50%) scale(1.05); opacity: 1;
           box-shadow: 0 0 18px rgba(248,243,232,0.85), 0 0 36px rgba(248,243,232,0.45); }
  }
  .ripple {
    position: fixed;
    width: 14px; height: 14px;
    border-radius: 50%;
    border: 1px solid rgba(248,243,232,0.7);
    transform: translate(-50%, -50%);
    pointer-events: none;
    animation: rippleAnim 1.8s ease-out forwards;
    z-index: 49;
  }
  @keyframes rippleAnim {
    0%   { transform: translate(-50%, -50%) scale(0.5); opacity: 0.85; }
    100% { transform: translate(-50%, -50%) scale(22); opacity: 0; }
  }

  /* HUD */
  #prompt {
    position: fixed;
    top: 4rem; left: 0; right: 0;
    text-align: center;
    font-size: 1.1rem;
    font-style: italic;
    opacity: 0;
    padding: 0 2rem;
    z-index: 10;
    transition: opacity 1.4s;
    pointer-events: none;
  }
  #prompt.visible { opacity: 0.6; }

  #counter {
    position: fixed;
    bottom: 1.4rem; left: 0; right: 0;
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.66rem;
    letter-spacing: 0.5em;
    opacity: 0.25;
    z-index: 10;
    pointer-events: none;
  }

  #outcome {
    position: fixed;
    bottom: 4.8rem; left: 0; right: 0;
    text-align: center;
    font-style: italic;
    font-size: 1.25rem;
    padding: 0 2rem;
    opacity: 0;
    transition: opacity 1.6s;
    pointer-events: none;
    z-index: 10;
    line-height: 1.5;
  }
  #outcome.visible { opacity: 0.85; }

  /* End screen */
  #end-screen {
    position: fixed; inset: 0; z-index: 200;
    display: none; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 2.4rem; background: #0a0908;
    padding: 2rem;
    opacity: 0;
    transition: opacity 1s;
  }
  #end-screen.visible { display: flex; opacity: 1; }
  #end-screen .quote {
    font-size: clamp(1.15rem, 4.5vw, 1.5rem);
    font-style: italic;
    text-align: center;
    max-width: 92%;
    opacity: 0.9;
    line-height: 1.7;
  }
  #end-screen .quote .small {
    opacity: 0.55;
    font-size: 0.9em;
  }
</style>
</head>
<body>

<a id="back-btn" href="../../index.html">← Games</a>

<div id="stage">
  <div id="prompt"></div>
  <div id="scene"></div>
  <div id="outcome"></div>
  <div id="counter"></div>
</div>

<div id="title-screen">
  <div class="big-dot"></div>
  <h1>PUNKT</h1>
  <div class="hr"></div>
  <p class="subtitle">A small dark shape, in many places.<br>Tap where it belongs.</p>
  <button class="btn" id="start-btn">Begin</button>
  <div class="credit">nine vignettes · one dot</div>
</div>

<div id="end-screen">
  <div class="quote"></div>
  <button class="btn" id="restart-btn">Begin Again</button>
</div>

<script>
const ORIENTATION = 'PORTRAIT';

function checkOrientation() {
  const isPortrait = window.innerHeight > window.innerWidth;
  const wrong = (ORIENTATION === 'PORTRAIT' && !isPortrait) ||
                (ORIENTATION === 'LANDSCAPE' && isPortrait);

  let overlay = document.getElementById('orientation-overlay');
  if (!overlay) {
    overlay = document.createElement('div');
    overlay.id = 'orientation-overlay';
    overlay.style.cssText = `
      display:none; position:fixed; inset:0; z-index:9999;
      background:#000; color:#fff; flex-direction:column;
      align-items:center; justify-content:center;
      font-family:sans-serif; font-size:1.2rem; text-align:center; gap:1rem;
    `;
    overlay.innerHTML = `
      <div style="font-size:3rem">📱</div>
      <div>Please rotate your device</div>
      <div style="font-size:0.85rem;opacity:0.6;">${ORIENTATION === 'PORTRAIT' ? 'This game is best played upright' : 'This game is best played sideways'}</div>
    `;
    document.body.appendChild(overlay);
  }
  overlay.style.display = wrong ? 'flex' : 'none';
}

window.addEventListener('resize', checkOrientation);
checkOrientation();

async function tryLockOrientation() {
  try {
    await document.documentElement.requestFullscreen?.();
    await screen.orientation?.lock?.(
      ORIENTATION === 'PORTRAIT' ? 'portrait' : 'landscape'
    );
  } catch (_) { /* not supported — overlay handles it */ }
}
document.addEventListener('pointerdown', tryLockOrientation, { once: true });

/* ----- Game ----- */

const levels = [
  {
    prompt: "End the sentence.",
    setup: (scene) => {
      scene.innerHTML = `
        <div class="sentence-level">I will go<span data-target></span></div>
      `;
    },
    tolerance: 75,
    poem: "And so it ended."
  },
  {
    prompt: "Help it see.",
    setup: (scene) => {
      scene.innerHTML = `
        <svg viewBox="0 0 400 220" class="level-svg" preserveAspectRatio="xMidYMid meet">
          <path class="stroke" stroke-width="1.6" stroke-linecap="round"
                d="M 40 110 Q 200 20 360 110 Q 200 200 40 110 Z"/>
          <circle class="stroke ghost" stroke-width="1" cx="200" cy="110" r="34"/>
          <circle data-target cx="200" cy="110" r="0"/>
        </svg>
      `;
    },
    tolerance: 80,
    poem: "And it could see."
  },
  {
    prompt: "Complete the letter.",
    setup: (scene) => {
      scene.innerHTML = `
        <svg viewBox="0 0 240 480" class="level-svg" preserveAspectRatio="xMidYMid meet" style="height: 60vh;">
          <rect class="filled" x="100" y="190" width="40" height="270" rx="2"/>
          <circle class="stroke ghost" stroke-width="1" cx="120" cy="120" r="22"/>
          <circle data-target cx="120" cy="120" r="0"/>
        </svg>
      `;
    },
    tolerance: 75,
    poem: "It became itself."
  },
  {
    prompt: "Find the missing star.",
    setup: (scene) => {
      scene.innerHTML = `
        <svg viewBox="0 0 400 560" class="level-svg" preserveAspectRatio="xMidYMid meet" style="height: 65vh;">
          <line class="stroke" stroke-width="0.8" opacity="0.5" x1="80"  y1="80"  x2="180" y2="180"/>
          <line class="stroke" stroke-width="0.8" opacity="0.5" x1="180" y1="180" x2="320" y2="160"/>
          <line class="stroke" stroke-width="0.8" opacity="0.5" x1="320" y1="160" x2="260" y2="320"/>
          <line class="stroke" stroke-width="0.8" opacity="0.35" stroke-dasharray="3 5"
                x1="260" y1="320" x2="200" y2="490"/>
          <circle class="star" cx="80"  cy="80"  r="3.5"/>
          <circle class="star" cx="180" cy="180" r="3.5"/>
          <circle class="star" cx="320" cy="160" r="3.5"/>
          <circle class="star" cx="260" cy="320" r="3.5"/>
          <circle class="stroke ghost" stroke-width="1" cx="200" cy="490" r="22"/>
          <circle data-target cx="200" cy="490" r="0"/>
        </svg>
      `;
    },
    tolerance: 95,
    poem: "A new star, named."
  },
  {
    prompt: "Place the tear.",
    setup: (scene) => {
      scene.innerHTML = `
        <svg viewBox="0 0 400 560" class="level-svg" preserveAspectRatio="xMidYMid meet" style="height: 65vh;">
          <path class="stroke" stroke-width="1.6" stroke-linecap="round"
                d="M 220 70 Q 130 90 130 220 Q 130 320 165 360 Q 175 410 195 460"/>
          <ellipse class="stroke" stroke-width="1.4" cx="170" cy="200" rx="16" ry="6"/>
          <line class="stroke" stroke-width="1" x1="156" y1="201" x2="184" y2="201" opacity="0.6"/>
          <path class="stroke ghost" stroke-width="1"
                d="M 168 210 Q 156 260 150 320"/>
          <circle class="stroke ghost" stroke-width="1" cx="150" cy="320" r="18"/>
          <circle data-target cx="150" cy="320" r="0"/>
        </svg>
      `;
    },
    tolerance: 85,
    poem: "Grief, briefly held."
  },
  {
    prompt: "Open it.",
    setup: (scene) => {
      scene.innerHTML = `
        <svg viewBox="0 0 400 560" class="level-svg" preserveAspectRatio="xMidYMid meet" style="height: 65vh;">
          <path class="stroke" stroke-width="2" stroke-linecap="round"
                d="M 200 540 Q 198 420 200 320 Q 200 250 200 180"/>
          <path class="stroke" stroke-width="1.3" opacity="0.75"
                d="M 200 420 Q 168 400 138 388"/>
          <path class="stroke" stroke-width="1.3" opacity="0.75"
                d="M 200 350 Q 235 328 268 318"/>
          <path class="stroke" stroke-width="1.3" opacity="0.75"
                d="M 200 270 Q 172 250 148 244"/>
          <path class="stroke ghost" stroke-width="1"
                d="M 175 145 Q 165 120 180 105 Q 200 90 220 105 Q 235 120 225 145"/>
          <circle class="stroke ghost" stroke-width="1" cx="200" cy="140" r="32"/>
          <circle data-target cx="200" cy="140" r="0"/>
        </svg>
      `;
    },
    tolerance: 85,
    poem: "Something opened."
  },
  {
    prompt: "Sound it.",
    setup: (scene) => {
      scene.innerHTML = `
        <svg viewBox="0 0 400 560" class="level-svg" preserveAspectRatio="xMidYMid meet" style="height: 65vh;">
          <line class="stroke" stroke-width="0.6" opacity="0.3" x1="40" y1="200" x2="360" y2="200"/>
          <line class="stroke" stroke-width="0.6" opacity="0.3" x1="40" y1="250" x2="360" y2="250"/>
          <line class="stroke" stroke-width="0.6" opacity="0.3" x1="40" y1="300" x2="360" y2="300"/>
          <line class="stroke" stroke-width="0.6" opacity="0.3" x1="40" y1="350" x2="360" y2="350"/>
          <line class="stroke" stroke-width="0.6" opacity="0.3" x1="40" y1="400" x2="360" y2="400"/>
          <line class="stroke" stroke-width="2.2" stroke-linecap="round" x1="208" y1="160" x2="208" y2="395"/>
          <path class="stroke" stroke-width="1.6" stroke-linecap="round" fill="none"
                d="M 208 160 Q 244 178 244 222"/>
          <ellipse class="stroke ghost" stroke-width="1" cx="194" cy="395" rx="20" ry="14"
                   transform="rotate(-18 194 395)"/>
          <circle data-target cx="194" cy="395" r="0"/>
        </svg>
      `;
    },
    tolerance: 85,
    poem: "A single note."
  },
  {
    prompt: "Hold the silence.",
    setup: (scene) => {
      scene.innerHTML = `
        <div class="pause-text">
          I wanted to say<br>
          <span class="gap"><span data-target></span></span><br>
          but couldn't.
        </div>
      `;
    },
    tolerance: 95,
    poem: "Some things stay unsaid."
  },
  {
    prompt: "Place yourself anywhere.",
    setup: (scene) => {
      scene.innerHTML = `
        <div class="blank-message">
          <span style="opacity:0.4">no target now.</span><br>
          choose your own place.
        </div>
      `;
    },
    tolerance: Infinity,
    poem: "And from here, anything begins."
  }
];

const stage = document.getElementById('stage');
const scene = document.getElementById('scene');
const promptEl = document.getElementById('prompt');
const outcome = document.getElementById('outcome');
const counter = document.getElementById('counter');
const titleScreen = document.getElementById('title-screen');
const endScreen = document.getElementById('end-screen');

let currentLevel = 0;
let acceptingInput = false;
let inGame = false;

function clearMarks() {
  document.querySelectorAll('.dot, .ripple').forEach(el => el.remove());
}

function loadLevel(idx) {
  currentLevel = idx;
  acceptingInput = false;
  clearMarks();
  outcome.classList.remove('visible');
  outcome.textContent = '';
  promptEl.classList.remove('visible');
  scene.classList.remove('fading');

  const level = levels[idx];
  level.setup(scene);
  counter.textContent =
    String(idx + 1).padStart(2, '0') + '   /   ' + String(levels.length).padStart(2, '0');
  promptEl.textContent = level.prompt;

  // Wait for layout, then fade prompt in.
  requestAnimationFrame(() => {
    setTimeout(() => {
      promptEl.classList.add('visible');
      acceptingInput = true;
    }, 350);
  });
}

function placeDot(x, y) {
  if (!acceptingInput) return;
  acceptingInput = false;

  const level = levels[currentLevel];
  const target = scene.querySelector('[data-target]');

  let isHit = level.tolerance === Infinity;
  if (target && level.tolerance !== Infinity) {
    const tr = target.getBoundingClientRect();
    const tx = tr.left + tr.width / 2;
    const ty = tr.top + tr.height / 2;
    const dx = x - tx, dy = y - ty;
    const dist = Math.sqrt(dx * dx + dy * dy);
    isHit = dist <= level.tolerance;
  }

  const dot = document.createElement('div');
  dot.className = 'dot';
  dot.style.left = x + 'px';
  dot.style.top = y + 'px';
  document.body.appendChild(dot);

  if (isHit) {
    const ripple = document.createElement('div');
    ripple.className = 'ripple';
    ripple.style.left = x + 'px';
    ripple.style.top = y + 'px';
    document.body.appendChild(ripple);
    dot.classList.add('hit');

    outcome.textContent = level.poem;
    setTimeout(() => outcome.classList.add('visible'), 500);
    setTimeout(() => advance(), 3200);
  } else {
    dot.classList.add('miss');
    outcome.innerHTML = '<span style="opacity:0.6">it slipped past.</span>';
    setTimeout(() => outcome.classList.add('visible'), 350);
    setTimeout(() => advance(), 2400);
  }
}

function advance() {
  scene.classList.add('fading');
  promptEl.classList.remove('visible');
  outcome.classList.remove('visible');
  setTimeout(() => {
    if (currentLevel + 1 >= levels.length) {
      showEnd();
    } else {
      loadLevel(currentLevel + 1);
    }
  }, 1000);
}

function showEnd() {
  scene.innerHTML = '';
  clearMarks();
  promptEl.classList.remove('visible');
  outcome.classList.remove('visible');
  counter.textContent = '';
  inGame = false;

  endScreen.querySelector('.quote').innerHTML = `
    Nine times you placed yourself.<br>
    Nine times you became something else.<br><br>
    <span class="small">A small dark shape,<br>finding its place.</span>
  `;
  endScreen.classList.add('visible');
}

function startGame() {
  endScreen.classList.remove('visible');
  titleScreen.classList.add('hidden');
  setTimeout(() => {
    titleScreen.style.display = 'none';
    inGame = true;
    loadLevel(0);
  }, 700);
}

document.getElementById('start-btn').addEventListener('click', startGame);
document.getElementById('restart-btn').addEventListener('click', () => {
  endScreen.classList.remove('visible');
  setTimeout(() => {
    inGame = true;
    loadLevel(0);
  }, 400);
});

stage.addEventListener('pointerdown', (e) => {
  if (!inGame) return;
  if (e.target.closest('#back-btn, .btn')) return;
  placeDot(e.clientX, e.clientY);
});

// Prevent unwanted touch behaviors
document.addEventListener('gesturestart', (e) => e.preventDefault());
document.addEventListener('contextmenu', (e) => e.preventDefault());
</script>
</body>
</html>
