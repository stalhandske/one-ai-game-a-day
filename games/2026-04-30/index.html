<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0e1c14">
<title>Bloom</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;800&family=Manrope:wght@500;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    overflow: hidden;
    background: #0a1310;
    font-family: 'Manrope', system-ui, sans-serif;
    color: #f4f1e8;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
    overscroll-behavior: none;
  }

  #back-btn {
    position: fixed;
    top: 0.75rem;
    left: 0.75rem;
    z-index: 9998;
    background: rgba(0,0,0,0.5);
    color: #fff;
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 8px;
    padding: 0.4rem 0.75rem;
    font-size: 0.85rem;
    cursor: pointer;
    text-decoration: none;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    font-family: inherit;
  }
  #back-btn:hover { background: rgba(0,0,0,0.75); }

  canvas#game {
    display: block;
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
  }

  /* HUD */
  #hud {
    position: fixed;
    top: 0.75rem;
    right: 0.75rem;
    z-index: 50;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 0.4rem;
    pointer-events: none;
  }
  .hud-item {
    background: rgba(10, 19, 16, 0.7);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 0.4rem 0.7rem;
    font-size: 0.85rem;
    font-weight: 700;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    display: flex;
    align-items: center;
    gap: 0.35rem;
    min-width: 70px;
    justify-content: center;
  }
  .hud-item .icon { font-size: 1rem; }
  .hud-item.hp { color: #ffb1b1; }
  .hud-item.sap { color: #fce6a0; }

  /* Bottom bar */
  #bottom-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 50;
    padding: 0.6rem 0.6rem calc(0.6rem + env(safe-area-inset-bottom));
    display: flex;
    gap: 0.4rem;
    justify-content: center;
    background: linear-gradient(180deg, transparent 0%, rgba(10,19,16,0.85) 60%, rgba(10,19,16,0.95) 100%);
  }

  .flower-btn {
    flex: 1;
    max-width: 130px;
    padding: 0.55rem 0.4rem;
    background: rgba(20, 35, 28, 0.92);
    border: 2px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    color: #f4f1e8;
    font-family: inherit;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.15rem;
    transition: transform 0.12s, border-color 0.12s, background 0.12s;
    -webkit-tap-highlight-color: transparent;
  }
  .flower-btn .emoji { font-size: 1.5rem; line-height: 1; }
  .flower-btn .name { font-size: 0.72rem; opacity: 0.85; letter-spacing: 0.02em; }
  .flower-btn .cost { font-size: 0.68rem; color: #fce6a0; font-weight: 700; }
  .flower-btn.selected {
    background: rgba(60, 90, 70, 0.95);
    border-color: #fce6a0;
    transform: translateY(-3px);
  }
  .flower-btn.disabled { opacity: 0.45; }

  /* Screens */
  .screen {
    position: fixed;
    inset: 0;
    z-index: 100;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem;
    transition: opacity 0.4s;
  }
  .screen.hidden { opacity: 0; pointer-events: none; }

  #title-screen {
    background:
      radial-gradient(ellipse at 50% 20%, rgba(124, 175, 110, 0.25) 0%, transparent 60%),
      linear-gradient(180deg, #1a3a2a 0%, #0a1310 100%);
  }

  #title h1 {
    font-family: 'Fraunces', serif;
    font-size: clamp(3.2rem, 13vw, 4.8rem);
    font-weight: 800;
    letter-spacing: -0.04em;
    color: #fce6a0;
    text-shadow: 0 4px 20px rgba(0,0,0,0.5);
    line-height: 1;
  }
  #title p.tag {
    font-size: 1rem;
    color: #b9c5b5;
    margin: 0.5rem 0 2.5rem;
    letter-spacing: 0.03em;
  }
  #title .hint {
    margin-top: 2rem;
    opacity: 0.7;
    max-width: 280px;
    font-size: 0.85rem;
    line-height: 1.5;
    color: #cbd6c4;
  }

  .btn {
    padding: 1rem 2.5rem;
    background: #fce6a0;
    color: #1a3a2a;
    border: none;
    border-radius: 12px;
    font-size: 1.1rem;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    box-shadow: 0 4px 0 #c9b475, 0 8px 24px rgba(0,0,0,0.4);
    transform: translateY(0);
    transition: transform 0.08s, box-shadow 0.08s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:active {
    transform: translateY(2px);
    box-shadow: 0 2px 0 #c9b475, 0 4px 12px rgba(0,0,0,0.4);
  }

  /* Game over */
  #gameover-screen { background: rgba(10, 19, 16, 0.92); backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px); }
  #gameover h2 {
    font-family: 'Fraunces', serif;
    font-size: 2.6rem;
    color: #fce6a0;
    margin-bottom: 0.5rem;
    line-height: 1.1;
  }
  #gameover h2.win { color: #b9f2a0; }
  #gameover .stats {
    color: #cbd6c4;
    margin-bottom: 2rem;
    font-size: 1rem;
    max-width: 280px;
    line-height: 1.5;
  }

  /* Wave banner */
  #wave-banner {
    position: fixed;
    top: 38%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.85);
    z-index: 60;
    background: rgba(10, 19, 16, 0.88);
    border: 1px solid rgba(252, 230, 160, 0.5);
    border-radius: 14px;
    padding: 0.85rem 1.6rem;
    font-family: 'Fraunces', serif;
    font-size: 1.4rem;
    color: #fce6a0;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.35s, transform 0.35s;
    text-align: center;
    letter-spacing: 0.02em;
  }
  #wave-banner.show {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
  }
  #wave-banner .sub {
    font-family: 'Manrope', sans-serif;
    font-size: 0.8rem;
    color: #b9c5b5;
    font-weight: 500;
    margin-top: 0.2rem;
  }
</style>
</head>
<body>

<a id="back-btn" href="../../index.html">← Games</a>

<canvas id="game"></canvas>

<div id="hud" class="hidden">
  <div class="hud-item hp"><span class="icon">🌳</span><span id="hp-text">10</span></div>
  <div class="hud-item sap"><span class="icon">🍯</span><span id="sap-text">90</span></div>
  <div class="hud-item"><span class="icon">🌊</span>W <span id="wave-text">1</span>/10</div>
</div>

<div id="bottom-bar" class="hidden">
  <button class="flower-btn selected" data-type="snapdragon">
    <div class="emoji">🌼</div>
    <div class="name">Snapdragon</div>
    <div class="cost">10 sap</div>
  </button>
  <button class="flower-btn" data-type="wisteria">
    <div class="emoji">💜</div>
    <div class="name">Wisteria</div>
    <div class="cost">20 sap</div>
  </button>
  <button class="flower-btn" data-type="bellflower">
    <div class="emoji">🔔</div>
    <div class="name">Bellflower</div>
    <div class="cost">35 sap</div>
  </button>
</div>

<div id="wave-banner"></div>

<div id="title-screen" class="screen">
  <div id="title">
    <h1>Bloom</h1>
    <p class="tag">Defend the Forest Heart</p>
    <button class="btn" id="start-btn">Plant Roots</button>
    <p class="hint">Tap empty grass to plant a flower. Tap your flowers when their petals dim to refill their energy. Don't let the beetles reach the heart.</p>
  </div>
</div>

<div id="gameover-screen" class="screen hidden">
  <div id="gameover">
    <h2 id="gameover-title">Forest Lost</h2>
    <div class="stats" id="gameover-stats"></div>
    <button class="btn" id="restart-btn">Try Again</button>
  </div>
</div>

<script>
'use strict';

// ============================================================
//   ORIENTATION (required boilerplate)
// ============================================================
const ORIENTATION = 'PORTRAIT';

function checkOrientation() {
  const isPortrait = window.innerHeight > window.innerWidth;
  const wrong = (ORIENTATION === 'PORTRAIT' && !isPortrait) ||
                (ORIENTATION === 'LANDSCAPE' && isPortrait);

  let overlay = document.getElementById('orientation-overlay');
  if (!overlay) {
    overlay = document.createElement('div');
    overlay.id = 'orientation-overlay';
    overlay.style.cssText = `
      display:none; position:fixed; inset:0; z-index:9999;
      background:#000; color:#fff; flex-direction:column;
      align-items:center; justify-content:center;
      font-family:sans-serif; font-size:1.2rem; text-align:center; gap:1rem;
    `;
    overlay.innerHTML = `
      <div style="font-size:3rem">📱</div>
      <div>Please rotate your device</div>
      <div style="font-size:0.85rem;opacity:0.6;">${ORIENTATION === 'PORTRAIT' ? 'This game is best played upright' : 'This game is best played sideways'}</div>
    `;
    document.body.appendChild(overlay);
  }
  overlay.style.display = wrong ? 'flex' : 'none';
}

window.addEventListener('resize', checkOrientation);
checkOrientation();

async function tryLockOrientation() {
  try {
    await document.documentElement.requestFullscreen?.();
    await screen.orientation?.lock?.(
      ORIENTATION === 'PORTRAIT' ? 'portrait' : 'landscape'
    );
  } catch (_) { /* not supported — overlay handles it */ }
}
document.addEventListener('pointerdown', tryLockOrientation, { once: true });

// ============================================================
//   CANVAS
// ============================================================
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let W = 0, H = 0, DPR = 1;

function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  canvas.width = Math.floor(W * DPR);
  canvas.height = Math.floor(H * DPR);
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  rebuildPath();
  rebuildBackground();
}
window.addEventListener('resize', resize);

// ============================================================
//   PATH
// ============================================================
const PATH_RADIUS = 30;
let pathPoints = [];
let segLengths = [];
let totalPathLength = 0;

function rebuildPath() {
  const pad = 36;
  const top = -28;
  const heartY = H - 130;
  const pathH = heartY - top;
  const pathW = W - pad * 2;

  // Relative waypoints (y in 0..1, x in 0..1)
  const rel = [
    { x: 0.50, y: 0.00 },
    { x: 0.50, y: 0.13 },
    { x: 0.18, y: 0.21 },
    { x: 0.18, y: 0.36 },
    { x: 0.82, y: 0.44 },
    { x: 0.82, y: 0.59 },
    { x: 0.30, y: 0.67 },
    { x: 0.30, y: 0.82 },
    { x: 0.55, y: 0.92 },
    { x: 0.55, y: 1.00 }
  ];
  pathPoints = rel.map(p => ({
    x: pad + p.x * pathW,
    y: top + p.y * pathH
  }));
  segLengths = [];
  totalPathLength = 0;
  for (let i = 0; i < pathPoints.length - 1; i++) {
    const a = pathPoints[i], b = pathPoints[i + 1];
    const len = Math.hypot(b.x - a.x, b.y - a.y);
    segLengths.push(len);
    totalPathLength += len;
  }
}

function distToPath(x, y) {
  let min = Infinity;
  for (let i = 0; i < pathPoints.length - 1; i++) {
    const a = pathPoints[i], b = pathPoints[i + 1];
    const dx = b.x - a.x, dy = b.y - a.y;
    const lenSq = dx * dx + dy * dy;
    if (lenSq === 0) continue;
    let t = ((x - a.x) * dx + (y - a.y) * dy) / lenSq;
    t = Math.max(0, Math.min(1, t));
    const px = a.x + t * dx, py = a.y + t * dy;
    const d = Math.hypot(x - px, y - py);
    if (d < min) min = d;
  }
  return min;
}

// ============================================================
//   BACKGROUND DOTS (cached)
// ============================================================
let bgCanvas = null;
function rebuildBackground() {
  bgCanvas = document.createElement('canvas');
  bgCanvas.width = Math.floor(W * DPR);
  bgCanvas.height = Math.floor(H * DPR);
  const c = bgCanvas.getContext('2d');
  c.setTransform(DPR, 0, 0, DPR, 0, 0);

  // Base gradient
  const grad = c.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#102018');
  grad.addColorStop(1, '#0a1410');
  c.fillStyle = grad;
  c.fillRect(0, 0, W, H);

  // Subtle dappled circles (varied)
  for (let i = 0; i < 18; i++) {
    const x = Math.random() * W;
    const y = Math.random() * H;
    const r = 60 + Math.random() * 90;
    const g = c.createRadialGradient(x, y, 0, x, y, r);
    g.addColorStop(0, 'rgba(160, 200, 140, 0.06)');
    g.addColorStop(1, 'rgba(160, 200, 140, 0)');
    c.fillStyle = g;
    c.beginPath();
    c.arc(x, y, r, 0, Math.PI * 2);
    c.fill();
  }

  // Dotted moss texture
  c.fillStyle = '#1a2a20';
  const spacing = 30;
  for (let x = spacing / 2; x < W; x += spacing) {
    for (let y = spacing / 2; y < H; y += spacing) {
      const jx = (Math.sin(x * 13 + y * 7) * 0.5 + 0.5) * 6;
      const jy = (Math.cos(x * 17 + y * 11) * 0.5 + 0.5) * 6;
      c.beginPath();
      c.arc(x + jx, y + jy, 1.4, 0, Math.PI * 2);
      c.fill();
    }
  }
}

// ============================================================
//   GAME DATA
// ============================================================
const FLOWER_TYPES = {
  snapdragon: {
    name: 'Snapdragon',
    cost: 10,
    range: 110,
    damage: 4,
    fireRate: 700,
    color: '#ffd86b',
    petalColor: '#ffb84a',
    centerColor: '#fff3b0',
    maxEnergy: 12,
    refillCost: 4
  },
  wisteria: {
    name: 'Wisteria',
    cost: 20,
    range: 95,
    damage: 0,
    fireRate: 1500,
    color: '#c5a3ff',
    petalColor: '#a778e8',
    centerColor: '#e7d6ff',
    maxEnergy: 8,
    slow: true,
    slowFactor: 0.45,
    slowDuration: 2200,
    refillCost: 8
  },
  bellflower: {
    name: 'Bellflower',
    cost: 35,
    range: 145,
    damage: 14,
    fireRate: 1900,
    color: '#ff9a6b',
    petalColor: '#ff7e3c',
    centerColor: '#ffd1b3',
    maxEnergy: 6,
    refillCost: 14
  }
};

const BEETLE_TYPES = {
  beetle: { hp: 8,  speed: 50, sap: 3, color: '#7ba546', size: 11, name: 'beetle' },
  hornet: { hp: 5,  speed: 100, sap: 4, color: '#f5a534', size: 9,  name: 'hornet' },
  stag:   { hp: 30, speed: 38, sap: 8, color: '#6a3f23', size: 14, name: 'stag beetle' }
};

const WAVES = [
  { count: 6,  spread: 900, types: ['beetle'] },
  { count: 9,  spread: 800, types: ['beetle'] },
  { count: 11, spread: 700, types: ['beetle', 'beetle', 'hornet'] },
  { count: 12, spread: 650, types: ['beetle', 'hornet', 'beetle'] },
  { count: 14, spread: 580, types: ['beetle', 'hornet', 'beetle', 'hornet'] },
  { count: 12, spread: 600, types: ['beetle', 'beetle', 'stag', 'hornet'] },
  { count: 16, spread: 480, types: ['hornet', 'beetle', 'stag', 'hornet'] },
  { count: 18, spread: 420, types: ['hornet', 'stag', 'beetle', 'hornet'] },
  { count: 20, spread: 380, types: ['hornet', 'stag', 'hornet', 'stag'] },
  { count: 22, spread: 340, types: ['stag', 'hornet', 'hornet', 'stag', 'beetle'] }
];

// ============================================================
//   STATE
// ============================================================
let state = 'title'; // title, playing, gameover, win
let sap = 90;
let heartHp = 10;
let waveNum = 0;
let flowers = [];
let beetles = [];
let projectiles = [];
let particles = [];
let selectedFlower = 'snapdragon';
let waveSpawnQueue = [];
let waveSpawnNext = 0;
let waveActive = false;
let nextWaveScheduled = false;
let lastTime = 0;
let allWavesDone = false;
let placingPreview = null;
let touchStart = null;
let beetlesKilled = 0;
let heartShake = 0;

// ============================================================
//   HUD
// ============================================================
const $hp = document.getElementById('hp-text');
const $sap = document.getElementById('sap-text');
const $wave = document.getElementById('wave-text');

function setHud() {
  $hp.textContent = Math.max(0, heartHp);
  $sap.textContent = sap;
  $wave.textContent = Math.max(1, waveNum);
}

function updateFlowerBar() {
  document.querySelectorAll('.flower-btn').forEach(btn => {
    const type = btn.dataset.type;
    btn.classList.toggle('selected', type === selectedFlower);
    btn.classList.toggle('disabled', sap < FLOWER_TYPES[type].cost);
  });
}

function showWaveBanner(title, sub) {
  const b = document.getElementById('wave-banner');
  b.innerHTML = title + (sub ? `<div class="sub">${sub}</div>` : '');
  b.classList.add('show');
  setTimeout(() => b.classList.remove('show'), 1700);
}

// ============================================================
//   GAME FLOW
// ============================================================
function startGame() {
  state = 'playing';
  sap = 90;
  heartHp = 10;
  waveNum = 0;
  flowers = [];
  beetles = [];
  projectiles = [];
  particles = [];
  waveSpawnQueue = [];
  waveActive = false;
  nextWaveScheduled = false;
  allWavesDone = false;
  selectedFlower = 'snapdragon';
  beetlesKilled = 0;
  heartShake = 0;

  document.getElementById('title-screen').classList.add('hidden');
  document.getElementById('gameover-screen').classList.add('hidden');
  document.getElementById('hud').classList.remove('hidden');
  document.getElementById('bottom-bar').classList.remove('hidden');

  setHud();
  updateFlowerBar();

  setTimeout(startNextWave, 1200);
}

function startNextWave() {
  if (state !== 'playing') return;
  waveNum++;
  if (waveNum > WAVES.length) {
    allWavesDone = true;
    waveNum = WAVES.length;
    return;
  }
  const w = WAVES[waveNum - 1];
  waveSpawnQueue = [];
  for (let i = 0; i < w.count; i++) {
    waveSpawnQueue.push(w.types[i % w.types.length]);
  }
  waveSpawnNext = performance.now() + 600;
  waveActive = true;
  showWaveBanner(`Wave ${waveNum}`, `${w.count} incoming`);
  setHud();
}

function endGame(win) {
  state = win ? 'win' : 'gameover';
  const titleEl = document.getElementById('gameover-title');
  titleEl.textContent = win ? 'Forest Saved!' : 'Forest Lost';
  titleEl.className = win ? 'win' : '';
  document.getElementById('gameover-stats').innerHTML = win
    ? `You held all ${WAVES.length} waves with <b>${heartHp}</b> health remaining.<br>${beetlesKilled} beetles defeated.`
    : `You held <b>${Math.max(0, waveNum - 1)}</b> wave${waveNum - 1 === 1 ? '' : 's'}.<br>${beetlesKilled} beetles defeated.`;
  document.getElementById('gameover-screen').classList.remove('hidden');
}

// ============================================================
//   ENTITIES
// ============================================================
function spawnBeetle(typeKey) {
  const t = BEETLE_TYPES[typeKey];
  beetles.push({
    type: typeKey,
    hp: t.hp,
    maxHp: t.hp,
    speed: t.speed,
    color: t.color,
    size: t.size,
    sap: t.sap,
    distAlong: 0,
    pathIdx: 0,
    x: pathPoints[0].x,
    y: pathPoints[0].y,
    slowUntil: 0,
    wobble: Math.random() * Math.PI * 2,
    reachedEnd: false,
    angle: Math.PI / 2
  });
}

function updateBeetle(b, dt) {
  const isSlowed = performance.now() < b.slowUntil;
  const speed = b.speed * (isSlowed ? 0.45 : 1);
  const prevX = b.x, prevY = b.y;
  b.distAlong += speed * dt;

  let dist = b.distAlong;
  let placed = false;
  for (let i = 0; i < segLengths.length; i++) {
    if (dist <= segLengths[i]) {
      const a = pathPoints[i], c = pathPoints[i + 1];
      const t = dist / segLengths[i];
      b.x = a.x + (c.x - a.x) * t;
      b.y = a.y + (c.y - a.y) * t;
      b.pathIdx = i;
      placed = true;
      break;
    }
    dist -= segLengths[i];
  }
  if (!placed) {
    b.reachedEnd = true;
  }
  // facing angle
  const dx = b.x - prevX, dy = b.y - prevY;
  if (dx * dx + dy * dy > 0.001) {
    b.angle = Math.atan2(dy, dx);
  }
}

function damageHeart(amount) {
  heartHp -= amount;
  heartShake = 1;
  if (heartHp <= 0) {
    heartHp = 0;
    setHud();
    endGame(false);
    return;
  }
  setHud();
}

function tryPlantFlower(x, y) {
  if (!canPlantHere(x, y)) return false;
  const type = FLOWER_TYPES[selectedFlower];
  sap -= type.cost;
  flowers.push({
    type: selectedFlower,
    x, y,
    energy: type.maxEnergy,
    lastFire: 0,
    fireFlash: 0,
    growth: 0,
    sway: Math.random() * Math.PI * 2
  });
  setHud();
  updateFlowerBar();
  return true;
}

function tryRefillFlower(f) {
  const type = FLOWER_TYPES[f.type];
  const cost = type.refillCost;
  if (f.energy >= type.maxEnergy) {
    // already full — gentle indicator pulse only
    for (let i = 0; i < 4; i++) {
      particles.push({
        x: f.x, y: f.y - 4,
        vx: (Math.random() - 0.5) * 30,
        vy: -20 - Math.random() * 30,
        life: 0.4, maxLife: 0.4,
        color: '#cbd6c4', size: 2, gravity: 30
      });
    }
    return false;
  }
  if (sap < cost) return false;
  sap -= cost;
  f.energy = type.maxEnergy;
  setHud();
  updateFlowerBar();
  for (let i = 0; i < 12; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = 30 + Math.random() * 80;
    particles.push({
      x: f.x, y: f.y - 4,
      vx: Math.cos(a) * s,
      vy: Math.sin(a) * s - 40,
      life: 0.7, maxLife: 0.7,
      color: '#aef', size: 2 + Math.random() * 2,
      gravity: 40
    });
  }
  return true;
}

function findTarget(f) {
  const type = FLOWER_TYPES[f.type];
  const range = type.range;
  let best = null, bestProgress = -1;
  for (const b of beetles) {
    if (b.hp <= 0 || b.reachedEnd) continue;
    const d = Math.hypot(b.x - f.x, b.y - f.y);
    if (d > range) continue;
    if (type.slow) return b;
    if (b.distAlong > bestProgress) {
      bestProgress = b.distAlong;
      best = b;
    }
  }
  return best;
}

function flowerFire(f, target) {
  const type = FLOWER_TYPES[f.type];
  const now = performance.now();
  if (f.energy <= 0) return;
  if (now - f.lastFire < type.fireRate) return;
  f.lastFire = now;
  f.energy--;
  f.fireFlash = 1;

  if (type.slow) {
    for (const b of beetles) {
      if (b.hp <= 0 || b.reachedEnd) continue;
      if (Math.hypot(b.x - f.x, b.y - f.y) <= type.range) {
        b.slowUntil = now + type.slowDuration;
        for (let i = 0; i < 3; i++) {
          particles.push({
            x: b.x, y: b.y,
            vx: (Math.random() - 0.5) * 30,
            vy: -10 - Math.random() * 30,
            life: 0.5, maxLife: 0.5,
            color: '#c5a3ff', size: 2.5, gravity: 30
          });
        }
      }
    }
    // ring particles from flower
    for (let i = 0; i < 14; i++) {
      const a = (i / 14) * Math.PI * 2;
      particles.push({
        x: f.x, y: f.y - 4,
        vx: Math.cos(a) * 60,
        vy: Math.sin(a) * 60,
        life: 0.5, maxLife: 0.5,
        color: '#c5a3ff', size: 2, gravity: 0
      });
    }
  } else {
    projectiles.push({
      x: f.x, y: f.y - 4,
      target,
      tx: target.x, ty: target.y,
      damage: type.damage,
      color: type.color,
      speed: f.type === 'bellflower' ? 320 : 380,
      size: f.type === 'bellflower' ? 6 : 4
    });
  }
}

function updateProjectile(p, dt) {
  if (p.target && p.target.hp > 0 && !p.target.reachedEnd) {
    p.tx = p.target.x;
    p.ty = p.target.y;
  }
  const dx = p.tx - p.x, dy = p.ty - p.y;
  const d = Math.hypot(dx, dy);
  const move = p.speed * dt;
  if (d <= move) {
    if (p.target && p.target.hp > 0) {
      p.target.hp -= p.damage;
      // hit particles
      for (let i = 0; i < 5; i++) {
        const a = Math.random() * Math.PI * 2;
        const s = 50 + Math.random() * 80;
        particles.push({
          x: p.tx, y: p.ty,
          vx: Math.cos(a) * s,
          vy: Math.sin(a) * s,
          life: 0.35, maxLife: 0.35,
          color: p.color, size: 2.5, gravity: 80
        });
      }
    }
    p.dead = true;
  } else {
    p.x += (dx / d) * move;
    p.y += (dy / d) * move;
  }
}

// ============================================================
//   PLACEMENT VALIDATION
// ============================================================
function canPlantHere(x, y) {
  for (const f of flowers) {
    if (Math.hypot(f.x - x, f.y - y) < 36) return false;
  }
  if (distToPath(x, y) < PATH_RADIUS + 16) return false;
  if (y > H - 110) return false;
  if (y < 56) return false;
  if (x < 24 || x > W - 24) return false;
  if (sap < FLOWER_TYPES[selectedFlower].cost) return false;
  return true;
}

function flowerAt(x, y) {
  let best = null, bestD = 32;
  for (const f of flowers) {
    const d = Math.hypot(f.x - x, f.y - y);
    if (d < bestD) {
      bestD = d;
      best = f;
    }
  }
  return best;
}

// ============================================================
//   RENDERING
// ============================================================
function easeOutBack(t) {
  const c1 = 1.70158, c3 = c1 + 1;
  return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
}

function render() {
  // Background
  if (bgCanvas) {
    ctx.drawImage(bgCanvas, 0, 0, W, H);
  } else {
    ctx.fillStyle = '#0e1c14';
    ctx.fillRect(0, 0, W, H);
  }

  drawPath();
  drawHeart();

  // sort flowers by y for natural draw order
  const drawables = [];
  for (const f of flowers) drawables.push({ y: f.y, kind: 'flower', obj: f });
  for (const b of beetles) drawables.push({ y: b.y, kind: 'beetle', obj: b });
  drawables.sort((a, b) => a.y - b.y);
  for (const d of drawables) {
    if (d.kind === 'flower') drawFlower(d.obj);
    else drawBeetle(d.obj);
  }

  for (const p of projectiles) drawProjectile(p);
  for (const part of particles) drawParticle(part);

  if (placingPreview) drawPlacingPreview();
}

function drawPath() {
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  // outer dark border
  ctx.strokeStyle = 'rgba(0,0,0,0.35)';
  ctx.lineWidth = PATH_RADIUS * 2 + 8;
  ctx.beginPath();
  ctx.moveTo(pathPoints[0].x, pathPoints[0].y);
  for (let i = 1; i < pathPoints.length; i++) ctx.lineTo(pathPoints[i].x, pathPoints[i].y);
  ctx.stroke();

  // dirt edge
  ctx.strokeStyle = '#3a2c18';
  ctx.lineWidth = PATH_RADIUS * 2 + 2;
  ctx.stroke();

  // inner dirt
  ctx.strokeStyle = '#5a4528';
  ctx.lineWidth = PATH_RADIUS * 2 - 4;
  ctx.stroke();

  // top highlight
  ctx.strokeStyle = '#7d6238';
  ctx.lineWidth = PATH_RADIUS * 2 - 16;
  ctx.stroke();

  // dotted center line
  ctx.strokeStyle = 'rgba(0,0,0,0.18)';
  ctx.lineWidth = 2;
  ctx.setLineDash([5, 9]);
  ctx.stroke();
  ctx.setLineDash([]);
}

function drawHeart() {
  const last = pathPoints[pathPoints.length - 1];
  const x = last.x;
  const y = Math.min(last.y - 22, H - 130);

  const shake = heartShake > 0 ? (Math.sin(performance.now() / 30) * heartShake * 4) : 0;

  // glow
  const glow = ctx.createRadialGradient(x, y, 0, x, y, 110);
  glow.addColorStop(0, 'rgba(252, 230, 160, 0.35)');
  glow.addColorStop(1, 'rgba(252, 230, 160, 0)');
  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.arc(x, y, 110, 0, Math.PI * 2);
  ctx.fill();

  ctx.save();
  ctx.translate(x + shake, y);

  // ground mound
  ctx.fillStyle = '#2a3d28';
  ctx.beginPath();
  ctx.ellipse(0, 28, 50, 8, 0, 0, Math.PI * 2);
  ctx.fill();

  // trunk
  ctx.fillStyle = '#4a3220';
  ctx.beginPath();
  ctx.moveTo(-10, 24);
  ctx.lineTo(-7, -10);
  ctx.lineTo(7, -10);
  ctx.lineTo(10, 24);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.fillRect(-10, 24, 6, -34);

  // canopy layers
  const t = performance.now() / 1000;
  const canopyColors = ['#3d6648', '#4a7a55', '#5d9268'];
  const offsets = [
    [0, -8, 38],
    [-15, -22, 26],
    [15, -22, 26],
    [0, -32, 28]
  ];
  for (let i = 0; i < offsets.length; i++) {
    const [ox, oy, r] = offsets[i];
    const sway = Math.sin(t + i) * 1.2;
    ctx.fillStyle = canopyColors[i % canopyColors.length];
    ctx.beginPath();
    ctx.arc(ox + sway, oy, r, 0, Math.PI * 2);
    ctx.fill();
  }
  // canopy highlight
  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  ctx.beginPath();
  ctx.arc(-10, -36, 14, 0, Math.PI * 2);
  ctx.fill();

  // small fruits (heart hp dots) hanging in canopy
  for (let i = 0; i < 10; i++) {
    const a = (i / 10) * Math.PI * 2;
    const dx = Math.cos(a) * 32;
    const dy = -16 + Math.sin(a) * 22;
    if (i < heartHp) {
      ctx.fillStyle = '#fce6a0';
      ctx.shadowColor = '#fce6a0';
      ctx.shadowBlur = 6;
    } else {
      ctx.fillStyle = 'rgba(252,230,160,0.15)';
      ctx.shadowBlur = 0;
    }
    ctx.beginPath();
    ctx.arc(dx, dy, 2.6, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.shadowBlur = 0;

  ctx.restore();
}

function drawFlower(f) {
  const type = FLOWER_TYPES[f.type];
  f.growth = Math.min(1, f.growth + 0.06);
  const scale = 0.25 + 0.75 * easeOutBack(f.growth);
  const swayA = Math.sin(performance.now() / 600 + f.sway) * 0.12;
  const energyRatio = f.energy / type.maxEnergy;

  ctx.save();
  ctx.translate(f.x, f.y);

  // shadow
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.beginPath();
  ctx.ellipse(0, 14, 12, 3.5, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.scale(scale, scale);
  ctx.rotate(swayA);

  // stem
  ctx.strokeStyle = '#3d6648';
  ctx.lineWidth = 3;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(0, 14);
  ctx.lineTo(0, -3);
  ctx.stroke();

  // leaves
  ctx.fillStyle = '#4a7a55';
  ctx.beginPath();
  ctx.ellipse(-7, 4, 7, 3.5, -0.6, 0, Math.PI * 2);
  ctx.ellipse(7, 7, 7, 3.5, 0.6, 0, Math.PI * 2);
  ctx.fill();

  const petalCount = f.type === 'wisteria' ? 6 : 5;
  const petalSize = f.type === 'bellflower' ? 12 : f.type === 'wisteria' ? 9 : 10;

  // fire flash glow
  if (f.fireFlash > 0) {
    const r = petalSize + 8;
    const g = ctx.createRadialGradient(0, -3, 0, 0, -3, r * 2);
    g.addColorStop(0, type.color + '88');
    g.addColorStop(1, type.color + '00');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(0, -3, r * 2, 0, Math.PI * 2);
    ctx.fill();
  }

  // dim if low energy
  const dim = energyRatio < 0.001;
  ctx.globalAlpha = dim ? 0.5 : 1;

  // petals
  ctx.fillStyle = type.petalColor;
  for (let i = 0; i < petalCount; i++) {
    const a = (i / petalCount) * Math.PI * 2 - Math.PI / 2;
    const px = Math.cos(a) * (petalSize * 0.6);
    const py = -3 + Math.sin(a) * (petalSize * 0.6);
    ctx.beginPath();
    ctx.ellipse(px, py, petalSize * 0.55, petalSize * 0.45, a, 0, Math.PI * 2);
    ctx.fill();
  }

  // petal highlights
  ctx.fillStyle = type.color;
  for (let i = 0; i < petalCount; i++) {
    const a = (i / petalCount) * Math.PI * 2 - Math.PI / 2;
    const px = Math.cos(a) * (petalSize * 0.55);
    const py = -3 + Math.sin(a) * (petalSize * 0.55);
    ctx.beginPath();
    ctx.arc(px, py, petalSize * 0.28, 0, Math.PI * 2);
    ctx.fill();
  }

  // center
  ctx.fillStyle = type.centerColor;
  ctx.beginPath();
  ctx.arc(0, -3, petalSize * 0.32, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = type.color;
  ctx.beginPath();
  ctx.arc(0, -3, petalSize * 0.18, 0, Math.PI * 2);
  ctx.fill();

  ctx.globalAlpha = 1;
  ctx.restore();

  // energy ring (always upright)
  const ringR = 19;
  ctx.beginPath();
  ctx.arc(f.x, f.y - 3, ringR, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(0,0,0,0.4)';
  ctx.lineWidth = 4;
  ctx.stroke();

  if (energyRatio > 0) {
    ctx.beginPath();
    ctx.arc(f.x, f.y - 3, ringR, -Math.PI / 2, -Math.PI / 2 + energyRatio * Math.PI * 2);
    ctx.strokeStyle = energyRatio > 0.3 ? '#9ce3f0' : '#ffb1b1';
    ctx.lineWidth = 3;
    ctx.lineCap = 'round';
    ctx.stroke();
  }

  // empty indicator pulse
  if (f.energy === 0) {
    const pulse = 0.5 + 0.5 * Math.sin(performance.now() / 200);
    ctx.fillStyle = `rgba(252, 230, 160, ${0.6 + pulse * 0.4})`;
    ctx.font = 'bold 11px Manrope, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('TAP', f.x, f.y - 28);
  }
}

function drawBeetle(b) {
  const wob = Math.sin(performance.now() / 180 + b.wobble) * 1.3;
  const x = b.x, y = b.y + wob;
  const isSlowed = performance.now() < b.slowUntil;

  // shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.ellipse(x, y + b.size, b.size * 0.95, b.size * 0.3, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(b.angle - Math.PI / 2);

  // legs
  ctx.strokeStyle = 'rgba(0,0,0,0.5)';
  ctx.lineWidth = 1.5;
  const legPhase = Math.sin(performance.now() / 100 + b.wobble) * 2;
  for (let s = -1; s <= 1; s += 2) {
    for (let i = -1; i <= 1; i++) {
      ctx.beginPath();
      ctx.moveTo(s * (b.size * 0.5), i * (b.size * 0.4));
      ctx.lineTo(s * (b.size * 0.95 + legPhase * (i % 2 ? 1 : -1)), i * (b.size * 0.7));
      ctx.stroke();
    }
  }

  // body
  ctx.fillStyle = b.color;
  ctx.beginPath();
  ctx.ellipse(0, 0, b.size, b.size * 0.85, 0, 0, Math.PI * 2);
  ctx.fill();

  // shell highlight
  ctx.fillStyle = 'rgba(255,255,255,0.18)';
  ctx.beginPath();
  ctx.ellipse(-b.size * 0.3, -b.size * 0.3, b.size * 0.4, b.size * 0.22, -0.5, 0, Math.PI * 2);
  ctx.fill();

  // shell line
  ctx.strokeStyle = 'rgba(0,0,0,0.45)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, -b.size * 0.85);
  ctx.lineTo(0, b.size * 0.85);
  ctx.stroke();

  // head
  ctx.fillStyle = '#1f1a14';
  ctx.beginPath();
  ctx.arc(0, -b.size * 0.85, b.size * 0.45, 0, Math.PI * 2);
  ctx.fill();

  // type-specific
  if (b.type === 'hornet') {
    // wings
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    const wf = Math.sin(performance.now() / 25) * 0.4 + 1;
    ctx.beginPath();
    ctx.ellipse(-b.size * 0.5, -b.size * 0.2, b.size * 0.5 * wf, b.size * 0.25 * wf, -0.6, 0, Math.PI * 2);
    ctx.ellipse(b.size * 0.5, -b.size * 0.2, b.size * 0.5 * wf, b.size * 0.25 * wf, 0.6, 0, Math.PI * 2);
    ctx.fill();
    // stripes
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(-b.size * 0.7, -b.size * 0.15, b.size * 1.4, 2);
    ctx.fillRect(-b.size * 0.7, b.size * 0.25, b.size * 1.4, 2);
  } else if (b.type === 'stag') {
    // mandibles
    ctx.strokeStyle = '#1f1a14';
    ctx.lineWidth = 2.5;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(-b.size * 0.4, -b.size * 1.0);
    ctx.lineTo(-b.size * 0.7, -b.size * 1.4);
    ctx.moveTo(b.size * 0.4, -b.size * 1.0);
    ctx.lineTo(b.size * 0.7, -b.size * 1.4);
    ctx.stroke();
  }

  ctx.restore();

  // hp bar
  if (b.hp < b.maxHp) {
    const barW = b.size * 2.2;
    const ratio = Math.max(0, b.hp / b.maxHp);
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(x - barW / 2, y - b.size - 8, barW, 3);
    ctx.fillStyle = ratio > 0.5 ? '#9be37e' : ratio > 0.25 ? '#fce6a0' : '#ff8888';
    ctx.fillRect(x - barW / 2, y - b.size - 8, barW * ratio, 3);
  }

  // slow halo
  if (isSlowed) {
    ctx.strokeStyle = 'rgba(197, 163, 255, 0.6)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(x, y, b.size + 5, 0, Math.PI * 2);
    ctx.stroke();
  }
}

function drawProjectile(p) {
  ctx.fillStyle = p.color + '55';
  ctx.beginPath();
  ctx.arc(p.x, p.y, p.size * 1.9, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = p.color;
  ctx.beginPath();
  ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.beginPath();
  ctx.arc(p.x - p.size * 0.3, p.y - p.size * 0.3, p.size * 0.4, 0, Math.PI * 2);
  ctx.fill();
}

function drawParticle(p) {
  const a = Math.max(0, p.life / p.maxLife);
  ctx.globalAlpha = a;
  ctx.fillStyle = p.color;
  ctx.beginPath();
  ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;
}

function drawPlacingPreview() {
  const f = placingPreview;
  const type = FLOWER_TYPES[selectedFlower];
  const ok = f.valid;
  const color = ok ? 'rgba(252, 230, 160, 0.7)' : 'rgba(255, 120, 120, 0.7)';

  // range circle
  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  ctx.setLineDash([5, 6]);
  ctx.beginPath();
  ctx.arc(f.x, f.y, type.range, 0, Math.PI * 2);
  ctx.stroke();
  ctx.setLineDash([]);

  // light fill
  ctx.fillStyle = ok ? 'rgba(252, 230, 160, 0.06)' : 'rgba(255, 120, 120, 0.06)';
  ctx.beginPath();
  ctx.arc(f.x, f.y, type.range, 0, Math.PI * 2);
  ctx.fill();

  // ghost flower
  ctx.globalAlpha = ok ? 0.85 : 0.4;
  ctx.fillStyle = type.petalColor;
  for (let i = 0; i < 5; i++) {
    const a = (i / 5) * Math.PI * 2 - Math.PI / 2;
    ctx.beginPath();
    ctx.arc(f.x + Math.cos(a) * 6, f.y - 3 + Math.sin(a) * 6, 5, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.fillStyle = type.color;
  ctx.beginPath();
  ctx.arc(f.x, f.y - 3, 4, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;
}

// ============================================================
//   GAME LOOP
// ============================================================
function loop(now) {
  const dt = Math.min(0.05, (now - lastTime) / 1000);
  lastTime = now;

  if (state === 'playing') {
    // Spawn
    if (waveActive && waveSpawnQueue.length > 0 && now >= waveSpawnNext) {
      const t = waveSpawnQueue.shift();
      spawnBeetle(t);
      const w = WAVES[waveNum - 1];
      waveSpawnNext = now + w.spread;
      if (waveSpawnQueue.length === 0) waveActive = false;
    }

    // Beetles
    for (const b of beetles) {
      if (b.hp > 0 && !b.reachedEnd) updateBeetle(b, dt);
    }

    // Heart damage
    let heartHits = 0;
    for (const b of beetles) {
      if (b.reachedEnd && !b._counted) {
        b._counted = true;
        heartHits++;
      }
    }
    if (heartHits > 0) damageHeart(heartHits);
    if (state !== 'playing') { render(); requestAnimationFrame(loop); return; }

    // Cull
    let countChanged = false;
    beetles = beetles.filter(b => {
      if (b.reachedEnd) return false;
      if (b.hp <= 0) {
        sap += b.sap;
        beetlesKilled++;
        countChanged = true;
        for (let i = 0; i < 8; i++) {
          const a = Math.random() * Math.PI * 2;
          const s = 50 + Math.random() * 100;
          particles.push({
            x: b.x, y: b.y,
            vx: Math.cos(a) * s,
            vy: Math.sin(a) * s,
            life: 0.5, maxLife: 0.5,
            color: b.color, size: 2.5 + Math.random() * 1.5, gravity: 90
          });
        }
        return false;
      }
      return true;
    });
    if (countChanged) { setHud(); updateFlowerBar(); }

    // Flowers
    for (const f of flowers) {
      if (f.fireFlash > 0) f.fireFlash -= dt * 5;
      if (f.fireFlash < 0) f.fireFlash = 0;
      if (f.energy > 0) {
        const target = findTarget(f);
        if (target) flowerFire(f, target);
      }
    }

    // Projectiles
    for (const p of projectiles) updateProjectile(p, dt);
    projectiles = projectiles.filter(p => !p.dead);

    // Particles
    for (const p of particles) {
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vy += (p.gravity || 0) * dt;
      p.life -= dt;
    }
    particles = particles.filter(p => p.life > 0);

    // Heart shake decay
    if (heartShake > 0) heartShake = Math.max(0, heartShake - dt * 3);

    // Wave end
    if (!waveActive && beetles.length === 0 && waveSpawnQueue.length === 0) {
      if (allWavesDone) {
        endGame(true);
      } else if (!nextWaveScheduled) {
        nextWaveScheduled = true;
        setTimeout(() => {
          nextWaveScheduled = false;
          startNextWave();
        }, 2400);
      }
    }
  } else {
    // still update particles for visual continuity
    for (const p of particles) {
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vy += (p.gravity || 0) * dt;
      p.life -= dt;
    }
    particles = particles.filter(p => p.life > 0);
  }

  render();
  requestAnimationFrame(loop);
}

// ============================================================
//   INPUT
// ============================================================
function getCanvasPos(e) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: e.clientX - rect.left,
    y: e.clientY - rect.top
  };
}

canvas.addEventListener('pointerdown', (e) => {
  if (state !== 'playing') return;
  const { x, y } = getCanvasPos(e);
  touchStart = { x, y, time: performance.now() };

  // If over a flower, no preview (it's a tap-to-refill)
  const over = flowerAt(x, y);
  if (over) {
    placingPreview = null;
  } else {
    placingPreview = { x, y, valid: canPlantHere(x, y) };
  }
});

canvas.addEventListener('pointermove', (e) => {
  if (!touchStart) return;
  const { x, y } = getCanvasPos(e);
  const over = flowerAt(x, y);
  if (over) {
    placingPreview = null;
  } else {
    if (!placingPreview) placingPreview = { x, y, valid: false };
    placingPreview.x = x;
    placingPreview.y = y;
    placingPreview.valid = canPlantHere(x, y);
  }
});

canvas.addEventListener('pointerup', (e) => {
  if (!touchStart) return;
  const { x, y } = getCanvasPos(e);
  const dx = x - touchStart.x, dy = y - touchStart.y;
  const dragDist = Math.hypot(dx, dy);
  const dur = performance.now() - touchStart.time;
  touchStart = null;
  placingPreview = null;

  if (state !== 'playing') return;
  if (dragDist < 28 && dur < 700) {
    handleTap(x, y);
  }
});

canvas.addEventListener('pointercancel', () => {
  touchStart = null;
  placingPreview = null;
});

function handleTap(x, y) {
  const f = flowerAt(x, y);
  if (f) {
    tryRefillFlower(f);
    return;
  }
  tryPlantFlower(x, y);
}

// Flower selection buttons
document.querySelectorAll('.flower-btn').forEach(btn => {
  btn.addEventListener('click', (e) => {
    e.stopPropagation();
    selectedFlower = btn.dataset.type;
    updateFlowerBar();
  });
});

document.getElementById('start-btn').addEventListener('click', startGame);
document.getElementById('restart-btn').addEventListener('click', startGame);

// ============================================================
//   INIT
// ============================================================
resize();
requestAnimationFrame((t) => { lastTime = t; loop(t); });

</script>
