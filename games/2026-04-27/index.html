<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Deep</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: radial-gradient(ellipse at top, #1a0a20 0%, #050308 100%);
    color: #e8d5a0;
    font-family: 'Press Start 2P', monospace;
    height: 100%;
    overflow: hidden;
    touch-action: manipulation;
    user-select: none;
    -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  #back-btn {
    position: fixed;
    top: 0.75rem;
    left: 0.75rem;
    z-index: 9998;
    background: rgba(0,0,0,0.5);
    color: #fff;
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 8px;
    padding: 0.4rem 0.75rem;
    font-size: 0.85rem;
    cursor: pointer;
    text-decoration: none;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    font-family: sans-serif;
  }
  #back-btn:hover { background: rgba(0,0,0,0.75); }

  #game-container {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 3.5rem 0.5rem 0.5rem;
  }

  #hud {
    width: 100%;
    max-width: 480px;
    display: flex;
    justify-content: flex-end;
    gap: 0.5rem;
    margin-bottom: 0.4rem;
  }

  .hud-item {
    display: flex;
    align-items: center;
    gap: 0.35rem;
    background: rgba(20, 10, 30, 0.7);
    padding: 0.45rem 0.65rem;
    border-radius: 6px;
    border: 1px solid rgba(160, 100, 200, 0.3);
    font-size: 0.7rem;
    min-width: 56px;
    justify-content: center;
  }
  .hud-icon { font-size: 0.9rem; }
  .hud-hp .hud-icon { color: #ff6080; }
  .hud-gem .hud-icon { color: #a0e0ff; }
  .hud-depth .hud-icon { color: #c896e8; }

  #canvas-wrap {
    flex: 1;
    width: 100%;
    max-width: 480px;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 0;
  }

  canvas {
    background: #0a0510;
    border: 2px solid #3a1f4a;
    border-radius: 8px;
    box-shadow: 0 0 40px rgba(140, 80, 200, 0.25), inset 0 0 30px rgba(0,0,0,0.6);
    display: block;
    touch-action: none;
  }

  #dpad {
    width: 100%;
    max-width: 220px;
    aspect-ratio: 1;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    grid-template-rows: 1fr 1fr 1fr;
    gap: 0.4rem;
    margin: 0.6rem 0 0.5rem;
    flex-shrink: 0;
  }

  .dpad-btn {
    background: rgba(80, 40, 120, 0.4);
    border: 2px solid rgba(180, 100, 220, 0.5);
    border-radius: 14px;
    color: #f0d8b0;
    font-size: 1.6rem;
    font-family: sans-serif;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
    touch-action: manipulation;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.08s, background 0.08s;
    box-shadow: inset 0 -3px 0 rgba(0,0,0,0.3);
  }
  .dpad-btn.active {
    background: rgba(180, 100, 220, 0.7);
    transform: scale(0.94);
  }

  .dpad-up { grid-column: 2; grid-row: 1; }
  .dpad-left { grid-column: 1; grid-row: 2; }
  .dpad-right { grid-column: 3; grid-row: 2; }
  .dpad-down { grid-column: 2; grid-row: 3; }

  #overlay {
    position: fixed;
    inset: 0;
    z-index: 100;
    background: rgba(8, 4, 14, 0.92);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    text-align: center;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
  }

  #overlay h1 {
    font-size: 2.8rem;
    margin: 0 0 0.6rem;
    color: #d8a8f0;
    text-shadow: 0 0 24px rgba(200, 150, 232, 0.7), 0 4px 0 #4a1a6a;
    letter-spacing: 2px;
  }

  #overlay .subtitle {
    font-size: 0.6rem;
    color: #a08070;
    margin-bottom: 1.8rem;
    letter-spacing: 1px;
  }

  #overlay .info {
    font-size: 0.65rem;
    line-height: 1.9;
    color: #c8a880;
    margin-bottom: 2rem;
    max-width: 320px;
  }

  #overlay .info .danger { color: #ff7090; }
  #overlay .info .gem { color: #a0e0ff; }
  #overlay .info .exit { color: #c896e8; }

  #overlay .stats {
    font-size: 0.85rem;
    color: #f0d8b0;
    margin-bottom: 0.8rem;
    line-height: 2;
  }
  #overlay .score {
    font-size: 1.3rem;
    color: #ffd86a;
    text-shadow: 0 0 16px rgba(255, 216, 106, 0.6);
    margin-bottom: 2rem;
  }

  #overlay button {
    background: linear-gradient(135deg, #6a2c8a, #a040c0);
    border: 2px solid #d8a8f0;
    color: #fff;
    padding: 1rem 2.2rem;
    font-size: 0.9rem;
    font-family: 'Press Start 2P', monospace;
    border-radius: 12px;
    cursor: pointer;
    box-shadow: 0 4px 0 #3a1a5a, 0 0 24px rgba(200, 150, 232, 0.4);
    letter-spacing: 1px;
  }
  #overlay button:active {
    transform: translateY(2px);
    box-shadow: 0 2px 0 #3a1a5a, 0 0 16px rgba(200, 150, 232, 0.4);
  }

  .hidden { display: none !important; }

  @media (max-height: 640px) {
    #overlay h1 { font-size: 2rem; }
    #dpad { max-width: 180px; }
  }
</style>
</head>
<body>

<a id="back-btn" href="../../index.html">← Games</a>

<div id="game-container">
  <div id="hud">
    <div class="hud-item hud-hp"><span class="hud-icon">♥</span><span id="hp">5</span></div>
    <div class="hud-item hud-gem"><span class="hud-icon">◆</span><span id="gems">0</span></div>
    <div class="hud-item hud-depth"><span class="hud-icon">▼</span><span id="depth">1</span></div>
  </div>
  <div id="canvas-wrap">
    <canvas id="game"></canvas>
  </div>
  <div id="dpad">
    <button class="dpad-btn dpad-up" data-dir="up" aria-label="Up">↑</button>
    <button class="dpad-btn dpad-left" data-dir="left" aria-label="Left">←</button>
    <button class="dpad-btn dpad-right" data-dir="right" aria-label="Right">→</button>
    <button class="dpad-btn dpad-down" data-dir="down" aria-label="Down">↓</button>
  </div>
</div>

<div id="overlay">
  <h1>DEEP</h1>
  <div class="subtitle">A CAVE ROGUELIKE</div>
  <div class="info">
    Dig through dirt.<br>
    Grab <span class="gem">◆ gems</span>.<br>
    Find the <span class="exit">stairs down</span>.<br>
    Beware of <span class="danger">monsters</span>.
  </div>
  <button id="start-btn">START</button>
</div>

<script>
const ORIENTATION = 'PORTRAIT';

function checkOrientation() {
  const isPortrait = window.innerHeight > window.innerWidth;
  const wrong = (ORIENTATION === 'PORTRAIT' && !isPortrait) ||
                (ORIENTATION === 'LANDSCAPE' && isPortrait);

  let overlay = document.getElementById('orientation-overlay');
  if (!overlay) {
    overlay = document.createElement('div');
    overlay.id = 'orientation-overlay';
    overlay.style.cssText = `
      display:none; position:fixed; inset:0; z-index:9999;
      background:#000; color:#fff; flex-direction:column;
      align-items:center; justify-content:center;
      font-family:sans-serif; font-size:1.2rem; text-align:center; gap:1rem;
    `;
    overlay.innerHTML = `
      <div style="font-size:3rem">📱</div>
      <div>Please rotate your device</div>
      <div style="font-size:0.85rem;opacity:0.6;">${ORIENTATION === 'PORTRAIT' ? 'This game is best played upright' : 'This game is best played sideways'}</div>
    `;
    document.body.appendChild(overlay);
  }
  overlay.style.display = wrong ? 'flex' : 'none';
}

window.addEventListener('resize', checkOrientation);
checkOrientation();

async function tryLockOrientation() {
  try {
    await document.documentElement.requestFullscreen?.();
    await screen.orientation?.lock?.(
      ORIENTATION === 'PORTRAIT' ? 'portrait' : 'landscape'
    );
  } catch (_) { /* not supported — overlay handles it */ }
}
document.addEventListener('pointerdown', tryLockOrientation, { once: true });

// ---- Game ----
const COLS = 9;
const ROWS = 13;
const EMPTY = 0;
const DIRT = 1;
const ROCK = 2;
const GEM = 3;
const ENEMY = 4;
const EXIT = 5;

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

let grid = null;
let player = { x: 4, y: 0 };
let enemies = [];
let hp = 5, gems = 0, depth = 1, maxHp = 5;
let gameStarted = false;
let gameOver = false;
let particles = [];
let tileSize = 36;
let animFrame = 0;
let shake = 0;
let descendFlash = 0;
let hitFlash = 0;

function resizeCanvas() {
  const wrap = document.getElementById('canvas-wrap');
  const w = wrap.clientWidth - 4;
  const h = wrap.clientHeight - 4;
  if (w <= 0 || h <= 0) return;
  const t = Math.max(20, Math.min(Math.floor(w / COLS), Math.floor(h / ROWS)));
  tileSize = t;
  canvas.width = COLS * t;
  canvas.height = ROWS * t;
}

window.addEventListener('resize', () => { resizeCanvas(); });

function genLevel() {
  grid = [];
  for (let y = 0; y < ROWS; y++) {
    const row = [];
    for (let x = 0; x < COLS; x++) {
      const r = Math.random();
      if (r < 0.07) row.push(ROCK);
      else if (r < 0.18) row.push(EMPTY);
      else row.push(DIRT);
    }
    grid.push(row);
  }

  // Player at top
  player = { x: Math.floor(COLS / 2), y: 0 };
  grid[player.y][player.x] = EMPTY;
  // Make sure at least one neighbor is passable
  const neighbors = [[0,1],[1,0],[-1,0]];
  let passable = false;
  for (const [dx, dy] of neighbors) {
    const nx = player.x + dx, ny = player.y + dy;
    if (nx < 0 || nx >= COLS || ny < 0 || ny >= ROWS) continue;
    if (grid[ny][nx] !== ROCK) { passable = true; break; }
  }
  if (!passable) grid[player.y + 1][player.x] = DIRT;

  // Place gems
  const numGems = 3 + Math.floor(depth / 2);
  let placed = 0, attempts = 0;
  while (placed < numGems && attempts < 200) {
    const x = Math.floor(Math.random() * COLS);
    const y = 1 + Math.floor(Math.random() * (ROWS - 2));
    if (grid[y][x] === DIRT || grid[y][x] === EMPTY) {
      grid[y][x] = GEM;
      placed++;
    }
    attempts++;
  }

  // Place enemies
  enemies = [];
  const numEnemies = Math.min(1 + Math.floor(depth * 0.6), 7);
  placed = 0; attempts = 0;
  while (placed < numEnemies && attempts < 200) {
    const x = Math.floor(Math.random() * COLS);
    const y = 3 + Math.floor(Math.random() * (ROWS - 3));
    const dist = Math.abs(x - player.x) + Math.abs(y - player.y);
    if ((grid[y][x] === DIRT || grid[y][x] === EMPTY) && dist > 3) {
      grid[y][x] = ENEMY;
      enemies.push({ x, y, hp: 1 + Math.floor(depth / 4) });
      placed++;
    }
    attempts++;
  }

  // Place exit at bottom row
  let exitX = Math.floor(Math.random() * COLS);
  for (let i = 0; i < COLS; i++) {
    const tx = (exitX + i) % COLS;
    if (grid[ROWS - 1][tx] !== ROCK) {
      grid[ROWS - 1][tx] = EXIT;
      break;
    }
  }
  // Fallback (extremely unlikely): force one
  if (!grid[ROWS - 1].includes(EXIT)) {
    grid[ROWS - 1][exitX] = EXIT;
  }

  descendFlash = 30;
}

function startGame() {
  hp = 5;
  maxHp = 5;
  gems = 0;
  depth = 1;
  gameOver = false;
  gameStarted = true;
  particles = [];
  genLevel();
  resizeCanvas();
  updateHUD();
}

function updateHUD() {
  document.getElementById('hp').textContent = hp;
  document.getElementById('gems').textContent = gems;
  document.getElementById('depth').textContent = depth;
}

function showOverlay(html) {
  const overlay = document.getElementById('overlay');
  overlay.innerHTML = html;
  overlay.classList.remove('hidden');
  const btn = document.getElementById('start-btn');
  if (btn) {
    btn.addEventListener('click', () => {
      overlay.classList.add('hidden');
      startGame();
    });
  }
}

function endGame() {
  gameOver = true;
  shake = 18;
  const score = gems * 10 + (depth - 1) * 100;
  setTimeout(() => {
    showOverlay(`
      <h1>YOU DIED</h1>
      <div class="subtitle">YOUR LANTERN GOES OUT</div>
      <div class="stats">
        Depth reached: <b>${depth}</b><br>
        Gems collected: <b>${gems}</b>
      </div>
      <div class="score">${score} pts</div>
      <button id="start-btn">DIG AGAIN</button>
    `);
  }, 700);
}

function spawnParticles(gx, gy, color, count, speed = 4) {
  for (let i = 0; i < count; i++) {
    particles.push({
      x: gx * tileSize + tileSize / 2,
      y: gy * tileSize + tileSize / 2,
      vx: (Math.random() - 0.5) * speed,
      vy: (Math.random() - 0.5) * speed,
      life: 24 + Math.random() * 12,
      maxLife: 32,
      color: color,
      size: 2 + Math.random() * 3
    });
  }
}

function move(dx, dy) {
  if (gameOver || !gameStarted) return;
  const nx = player.x + dx;
  const ny = player.y + dy;
  if (nx < 0 || nx >= COLS || ny < 0 || ny >= ROWS) return;

  const tile = grid[ny][nx];
  let consumedTurn = true;

  if (tile === ROCK) {
    shake = 4;
    consumedTurn = false;
  } else if (tile === DIRT) {
    grid[ny][nx] = EMPTY;
    spawnParticles(nx, ny, '#7a4a2a', 6);
    player.x = nx;
    player.y = ny;
  } else if (tile === GEM) {
    grid[ny][nx] = EMPTY;
    gems++;
    spawnParticles(nx, ny, '#a0e0ff', 14, 5);
    player.x = nx;
    player.y = ny;
  } else if (tile === ENEMY) {
    const enemy = enemies.find(e => e.x === nx && e.y === ny);
    if (enemy) {
      enemy.hp--;
      spawnParticles(nx, ny, '#ff6080', 8);
      shake = 5;
      if (enemy.hp <= 0) {
        grid[ny][nx] = EMPTY;
        enemies = enemies.filter(e => e !== enemy);
        spawnParticles(nx, ny, '#ff90a0', 18, 6);
      } else {
        hp--;
        hitFlash = 15;
        shake = 8;
      }
    }
  } else if (tile === EXIT) {
    depth++;
    if (hp < maxHp) hp++;
    spawnParticles(player.x, player.y, '#c896e8', 16, 5);
    genLevel();
    updateHUD();
    return;
  } else {
    player.x = nx;
    player.y = ny;
  }

  if (consumedTurn) {
    moveEnemies();
  }

  if (hp <= 0) {
    endGame();
  }

  updateHUD();
}

function moveEnemies() {
  for (const enemy of enemies) {
    const dx = Math.sign(player.x - enemy.x);
    const dy = Math.sign(player.y - enemy.y);
    const dist = Math.abs(player.x - enemy.x) + Math.abs(player.y - enemy.y);
    if (dist > 7) continue; // far away enemies idle

    const moves = [];
    if (Math.abs(player.x - enemy.x) >= Math.abs(player.y - enemy.y)) {
      if (dx !== 0) moves.push([dx, 0]);
      if (dy !== 0) moves.push([0, dy]);
    } else {
      if (dy !== 0) moves.push([0, dy]);
      if (dx !== 0) moves.push([dx, 0]);
    }

    for (const [mx, my] of moves) {
      const nx = enemy.x + mx;
      const ny = enemy.y + my;
      if (nx < 0 || nx >= COLS || ny < 0 || ny >= ROWS) continue;
      if (nx === player.x && ny === player.y) {
        hp--;
        hitFlash = 15;
        spawnParticles(player.x, player.y, '#ff4060', 12, 5);
        shake = 8;
        break;
      }
      const tile = grid[ny][nx];
      if (tile === EMPTY) {
        grid[enemy.y][enemy.x] = EMPTY;
        enemy.x = nx;
        enemy.y = ny;
        grid[ny][nx] = ENEMY;
        break;
      }
    }
  }
}

function drawTile(x, y, tile) {
  const px = x * tileSize;
  const py = y * tileSize;
  const ts = tileSize;

  if (tile === DIRT) {
    ctx.fillStyle = '#3a2418';
    ctx.fillRect(px, py, ts, ts);
    ctx.fillStyle = '#523222';
    const seed = (x * 137 + y * 211) % 1000;
    for (let i = 0; i < 4; i++) {
      const dx = (seed + i * 89) % (ts - 6) + 1;
      const dy = (seed + i * 53 + 17) % (ts - 6) + 1;
      ctx.fillRect(px + dx, py + dy, 2, 2);
    }
    ctx.fillStyle = '#2a1810';
    ctx.fillRect(px, py + ts - 2, ts, 2);
    ctx.fillRect(px + ts - 2, py, 2, ts);
  } else if (tile === ROCK) {
    ctx.fillStyle = '#4a4258';
    ctx.fillRect(px, py, ts, ts);
    ctx.fillStyle = '#6a627a';
    ctx.fillRect(px + 2, py + 2, ts - 4, 3);
    ctx.fillRect(px + 2, py + 2, 3, ts - 4);
    ctx.fillStyle = '#2a2238';
    ctx.fillRect(px + 3, py + ts - 5, ts - 6, 3);
    ctx.fillRect(px + ts - 5, py + 3, 3, ts - 6);
    ctx.fillStyle = '#5a526a';
    ctx.fillRect(px + ts * 0.3, py + ts * 0.4, 3, 3);
  } else if (tile === GEM) {
    drawCaveFloor(x, y);
    const pulse = 0.85 + 0.15 * Math.sin(animFrame * 0.12 + x + y);
    const cx = px + ts / 2;
    const cy = py + ts / 2;
    const r = ts * 0.28 * pulse;
    const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, r * 2.5);
    g.addColorStop(0, 'rgba(160, 224, 255, 0.55)');
    g.addColorStop(1, 'rgba(160, 224, 255, 0)');
    ctx.fillStyle = g;
    ctx.fillRect(px - 4, py - 4, ts + 8, ts + 8);
    ctx.fillStyle = '#a0e0ff';
    ctx.beginPath();
    ctx.moveTo(cx, cy - r);
    ctx.lineTo(cx + r * 0.7, cy);
    ctx.lineTo(cx, cy + r);
    ctx.lineTo(cx - r * 0.7, cy);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#e0f8ff';
    ctx.beginPath();
    ctx.moveTo(cx - r * 0.3, cy - r * 0.4);
    ctx.lineTo(cx + r * 0.15, cy - r * 0.6);
    ctx.lineTo(cx + r * 0.05, cy - r * 0.1);
    ctx.lineTo(cx - r * 0.4, cy + r * 0.1);
    ctx.closePath();
    ctx.fill();
  } else if (tile === ENEMY) {
    drawCaveFloor(x, y);
    const cx = px + ts / 2;
    const cy = py + ts / 2;
    const wobble = Math.sin(animFrame * 0.15 + x * 1.7 + y * 2.3) * 2;
    const enemy = enemies.find(e => e.x === x && e.y === y);
    // Body
    ctx.fillStyle = '#8a3050';
    ctx.beginPath();
    ctx.ellipse(cx, cy + wobble + ts * 0.05, ts * 0.32, ts * 0.28, 0, 0, Math.PI * 2);
    ctx.fill();
    // Spikes
    ctx.fillStyle = '#6a2040';
    for (let i = -1; i <= 1; i++) {
      ctx.beginPath();
      ctx.moveTo(cx + i * ts * 0.18, cy + wobble - ts * 0.18);
      ctx.lineTo(cx + i * ts * 0.18 - 3, cy + wobble - ts * 0.05);
      ctx.lineTo(cx + i * ts * 0.18 + 3, cy + wobble - ts * 0.05);
      ctx.closePath();
      ctx.fill();
    }
    // Eyes
    ctx.fillStyle = '#fff080';
    ctx.beginPath();
    ctx.arc(cx - ts * 0.11, cy + wobble + ts * 0.02, ts * 0.07, 0, Math.PI * 2);
    ctx.arc(cx + ts * 0.11, cy + wobble + ts * 0.02, ts * 0.07, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.arc(cx - ts * 0.11, cy + wobble + ts * 0.02, ts * 0.035, 0, Math.PI * 2);
    ctx.arc(cx + ts * 0.11, cy + wobble + ts * 0.02, ts * 0.035, 0, Math.PI * 2);
    ctx.fill();
    // HP indicator if injured
    if (enemy && enemy.hp > 1) {
      ctx.fillStyle = '#fff';
      ctx.font = `bold ${Math.floor(ts * 0.2)}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.fillText(enemy.hp, cx, py + ts * 0.95);
    }
  } else if (tile === EXIT) {
    drawCaveFloor(x, y);
    const cx = px + ts / 2;
    const cy = py + ts / 2;
    const pulse = 0.7 + 0.3 * Math.sin(animFrame * 0.1);
    const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, ts);
    g.addColorStop(0, `rgba(200, 150, 232, ${0.55 * pulse})`);
    g.addColorStop(1, 'rgba(200, 150, 232, 0)');
    ctx.fillStyle = g;
    ctx.fillRect(px - 4, py - 4, ts + 8, ts + 8);
    // Stairs
    ctx.fillStyle = '#5a3070';
    for (let i = 0; i < 3; i++) {
      const sx = px + ts * (0.18 + i * 0.07);
      const sy = py + ts * (0.32 + i * 0.16);
      const sw = ts * (0.64 - i * 0.14);
      const sh = ts * 0.13;
      ctx.fillRect(sx, sy, sw, sh);
      ctx.fillStyle = '#c896e8';
      ctx.fillRect(sx, sy, sw, 2);
      ctx.fillStyle = '#5a3070';
    }
  } else {
    drawCaveFloor(x, y);
  }
}

function drawCaveFloor(x, y) {
  const px = x * tileSize;
  const py = y * tileSize;
  const ts = tileSize;
  ctx.fillStyle = '#15080f';
  ctx.fillRect(px, py, ts, ts);
  // Subtle floor texture
  const seed = (x * 47 + y * 73) % 100;
  ctx.fillStyle = '#1f0e1a';
  ctx.fillRect(px + (seed % (ts - 4)), py + ((seed * 7) % (ts - 4)), 2, 2);
}

function drawPlayer() {
  const ppx = player.x * tileSize + tileSize / 2;
  const ppy = player.y * tileSize + tileSize / 2;
  const ts = tileSize;

  // Lantern light (soft glow around player)
  const lightR = ts * 2.2;
  const lg = ctx.createRadialGradient(ppx, ppy, 0, ppx, ppy, lightR);
  lg.addColorStop(0, 'rgba(255, 220, 140, 0.18)');
  lg.addColorStop(0.5, 'rgba(255, 200, 100, 0.05)');
  lg.addColorStop(1, 'rgba(255, 200, 100, 0)');
  ctx.fillStyle = lg;
  ctx.fillRect(ppx - lightR, ppy - lightR, lightR * 2, lightR * 2);

  // Body
  const bob = Math.sin(animFrame * 0.1) * 0.5;
  ctx.fillStyle = hitFlash > 0 ? '#ff8888' : '#e0a060';
  ctx.beginPath();
  ctx.ellipse(ppx, ppy + bob + ts * 0.04, ts * 0.26, ts * 0.3, 0, 0, Math.PI * 2);
  ctx.fill();

  // Head
  ctx.fillStyle = hitFlash > 0 ? '#ffc0c0' : '#f0c890';
  ctx.beginPath();
  ctx.arc(ppx, ppy + bob - ts * 0.12, ts * 0.18, 0, Math.PI * 2);
  ctx.fill();

  // Helmet/cap
  ctx.fillStyle = '#5a3a8a';
  ctx.beginPath();
  ctx.arc(ppx, ppy + bob - ts * 0.18, ts * 0.18, Math.PI, 0);
  ctx.fill();
  ctx.fillRect(ppx - ts * 0.18, ppy + bob - ts * 0.2, ts * 0.36, ts * 0.04);

  // Helmet light
  const lightFlick = 0.85 + Math.sin(animFrame * 0.4) * 0.15;
  ctx.fillStyle = `rgba(255, 240, 160, ${lightFlick})`;
  ctx.beginPath();
  ctx.arc(ppx, ppy + bob - ts * 0.22, ts * 0.06, 0, Math.PI * 2);
  ctx.fill();

  // Eyes
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.arc(ppx - ts * 0.06, ppy + bob - ts * 0.1, ts * 0.025, 0, Math.PI * 2);
  ctx.arc(ppx + ts * 0.06, ppy + bob - ts * 0.1, ts * 0.025, 0, Math.PI * 2);
  ctx.fill();
}

function draw() {
  if (!ctx) return;
  ctx.fillStyle = '#0a0510';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  if (!grid) return;

  ctx.save();
  if (shake > 0.1) {
    const sx = (Math.random() - 0.5) * shake;
    const sy = (Math.random() - 0.5) * shake;
    ctx.translate(sx, sy);
  }

  // Draw grid
  for (let y = 0; y < ROWS; y++) {
    for (let x = 0; x < COLS; x++) {
      drawTile(x, y, grid[y][x]);
    }
  }

  drawPlayer();

  // Particles
  particles = particles.filter(p => p.life > 0);
  for (const p of particles) {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.15; // slight gravity
    p.life--;
    ctx.globalAlpha = Math.max(0, Math.min(1, p.life / p.maxLife));
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
  }
  ctx.globalAlpha = 1;

  // Descend flash overlay
  if (descendFlash > 0) {
    ctx.fillStyle = `rgba(200, 150, 232, ${descendFlash / 60})`;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    descendFlash--;
  }

  // Hit flash
  if (hitFlash > 0) {
    ctx.fillStyle = `rgba(255, 60, 80, ${hitFlash / 40})`;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    hitFlash--;
  }

  ctx.restore();

  if (shake > 0) shake *= 0.85;
  if (shake < 0.1) shake = 0;
}

function loop() {
  animFrame++;
  draw();
  requestAnimationFrame(loop);
}

// ---- Controls ----
function bindDpad() {
  document.querySelectorAll('.dpad-btn').forEach(btn => {
    const handler = (e) => {
      e.preventDefault();
      btn.classList.add('active');
      setTimeout(() => btn.classList.remove('active'), 100);
      const dir = btn.dataset.dir;
      if (dir === 'up') move(0, -1);
      else if (dir === 'down') move(0, 1);
      else if (dir === 'left') move(-1, 0);
      else if (dir === 'right') move(1, 0);
    };
    btn.addEventListener('pointerdown', handler);
    // Prevent ghost click
    btn.addEventListener('click', (e) => e.preventDefault());
  });
}
bindDpad();

document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') { e.preventDefault(); move(0, -1); }
  else if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') { e.preventDefault(); move(0, 1); }
  else if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') { e.preventDefault(); move(-1, 0); }
  else if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') { e.preventDefault(); move(1, 0); }
});

// Swipe on canvas
let touchStart = null;
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  const t = e.touches[0];
  touchStart = { x: t.clientX, y: t.clientY };
}, { passive: false });
canvas.addEventListener('touchend', (e) => {
  e.preventDefault();
  if (!touchStart) return;
  const t = e.changedTouches[0];
  const dx = t.clientX - touchStart.x;
  const dy = t.clientY - touchStart.y;
  const adx = Math.abs(dx);
  const ady = Math.abs(dy);
  if (adx < 20 && ady < 20) { touchStart = null; return; }
  if (adx > ady) move(dx > 0 ? 1 : -1, 0);
  else move(0, dy > 0 ? 1 : -1);
  touchStart = null;
}, { passive: false });

document.getElementById('start-btn').addEventListener('click', () => {
  document.getElementById('overlay').classList.add('hidden');
  startGame();
});

resizeCanvas();
loop();
</script>
</body>
</html>
