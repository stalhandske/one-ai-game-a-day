<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#0b0516" />
<title>Candle Keeper</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Nunito:wght@600;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0b0516; color: #f5e7c8; font-family: 'Nunito', sans-serif; user-select: none; -webkit-user-select: none; touch-action: none; }
  canvas { display: block; position: fixed; inset: 0; width: 100%; height: 100%; }

  #back-btn {
    position: fixed;
    top: 0.75rem;
    left: 0.75rem;
    z-index: 9998;
    background: rgba(0,0,0,0.5);
    color: #fff;
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 8px;
    padding: 0.4rem 0.75rem;
    font-size: 0.85rem;
    cursor: pointer;
    text-decoration: none;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    font-family: 'Nunito', sans-serif;
  }
  #back-btn:hover { background: rgba(0,0,0,0.75); }

  .screen {
    position: fixed;
    inset: 0;
    z-index: 100;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem 1.5rem;
    pointer-events: auto;
  }
  .screen.visible { display: flex; }

  #title-screen {
    background: radial-gradient(ellipse at center, rgba(50, 20, 80, 0.6) 0%, rgba(11, 5, 22, 0.92) 70%);
  }

  #game-over-screen {
    background: radial-gradient(ellipse at center, rgba(80, 10, 20, 0.6) 0%, rgba(11, 5, 22, 0.94) 70%);
  }

  .title {
    font-family: 'Cinzel', serif;
    font-size: clamp(2.2rem, 10vw, 4rem);
    letter-spacing: 0.08em;
    color: #ffd98a;
    text-shadow: 0 0 16px rgba(255, 180, 80, 0.55), 0 0 38px rgba(255, 100, 30, 0.35);
    margin-bottom: 0.4rem;
    line-height: 1.1;
  }
  .subtitle {
    font-family: 'Cinzel', serif;
    font-size: clamp(0.85rem, 3vw, 1.05rem);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: #b090d8;
    margin-bottom: 2rem;
    opacity: 0.9;
  }
  .how {
    max-width: 420px;
    font-size: clamp(0.9rem, 3.3vw, 1rem);
    line-height: 1.55;
    color: #e7d6b0;
    margin-bottom: 2rem;
    opacity: 0.92;
  }
  .legend {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 0.5rem 0.9rem;
    align-items: center;
    max-width: 320px;
    margin: 0 auto 2rem;
    font-size: clamp(0.85rem, 3vw, 0.95rem);
    color: #e7d6b0;
    text-align: left;
  }
  .legend .ghost-sample {
    width: 40px; height: 40px; border-radius: 50%;
    display: grid; place-items: center;
    font-size: 1rem;
    font-weight: 700;
  }
  .gs-white { background: radial-gradient(circle at 40% 35%, #ffffff 0%, #c9bce4 70%); color: #5b3080; box-shadow: 0 0 14px rgba(255,255,255,0.45); }
  .gs-red   { background: radial-gradient(circle at 40% 35%, #ff7a7a 0%, #8e1820 70%); color: #fff; box-shadow: 0 0 14px rgba(255, 50, 50, 0.55); }
  .gs-blue  { background: radial-gradient(circle at 40% 35%, #9fd2ff 0%, #1a3d7a 70%); color: #fff; box-shadow: 0 0 14px rgba(80, 140, 255, 0.55); }
  .gs-green { background: radial-gradient(circle at 40% 35%, #bfffb8 0%, #1f7a3a 70%); color: #fff; box-shadow: 0 0 14px rgba(80, 220, 120, 0.55); }

  .btn {
    font-family: 'Cinzel', serif;
    background: linear-gradient(180deg, #ffba55, #c5631b);
    color: #2a0b00;
    border: 2px solid #ffd98a;
    border-radius: 14px;
    padding: 0.95rem 2.2rem;
    font-size: clamp(1rem, 4vw, 1.25rem);
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    box-shadow: 0 0 24px rgba(255, 150, 50, 0.55), inset 0 1px 0 rgba(255,255,255,0.5);
    cursor: pointer;
    transition: transform 0.1s ease, box-shadow 0.15s ease;
    touch-action: manipulation;
  }
  .btn:active { transform: scale(0.97); box-shadow: 0 0 14px rgba(255, 150, 50, 0.45); }

  .stats {
    margin: 0.6rem 0 2rem;
    font-size: clamp(1rem, 3.7vw, 1.15rem);
    color: #f0dcaf;
    line-height: 1.7;
  }
  .stats .big {
    font-family: 'Cinzel', serif;
    font-size: clamp(2.4rem, 12vw, 4rem);
    color: #ffd98a;
    display: block;
    text-shadow: 0 0 18px rgba(255, 200, 80, 0.5);
    margin: 0.25rem 0 0.5rem;
  }
  .stats .best { font-size: 0.9rem; opacity: 0.8; }

  #hud {
    position: fixed;
    top: 0.75rem;
    right: 0.75rem;
    z-index: 10;
    text-align: right;
    pointer-events: none;
    font-family: 'Cinzel', serif;
    color: #ffd98a;
    text-shadow: 0 0 8px rgba(255, 180, 60, 0.55), 0 2px 6px rgba(0,0,0,0.6);
  }
  #hud .score {
    font-size: clamp(1.3rem, 5.5vw, 1.8rem);
    font-weight: 700;
    letter-spacing: 0.08em;
  }
  #hud .wave {
    font-size: clamp(0.7rem, 2.6vw, 0.85rem);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    opacity: 0.8;
  }
  #hud.hidden { display: none; }

  .flash {
    position: fixed; inset: 0; z-index: 50;
    background: radial-gradient(circle at center, rgba(255, 60, 60, 0.55), rgba(255, 0, 0, 0) 60%);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.18s ease;
  }
  .flash.show { opacity: 1; }
</style>
</head>
<body>
  <a id="back-btn" href="../../index.html">← Games</a>
  <canvas id="game"></canvas>

  <div id="hud" class="hidden">
    <div class="score">0</div>
    <div class="wave">Wave 1</div>
  </div>

  <div id="title-screen" class="screen visible">
    <div class="title">Candle Keeper</div>
    <div class="subtitle">A haunted night</div>
    <div class="how">
      Tap the spirits before they reach the candles.
      Extinguish them all — and the night claims you.
    </div>
    <div class="legend">
      <div class="ghost-sample gs-white">1</div><div>Pale wisp — one tap</div>
      <div class="ghost-sample gs-red">!</div><div>Rager — fast, one tap</div>
      <div class="ghost-sample gs-blue">2</div><div>Revenant — two taps</div>
      <div class="ghost-sample gs-green">S</div><div>Splitter — splits in two</div>
    </div>
    <button class="btn" id="start-btn">Begin Vigil</button>
  </div>

  <div id="game-over-screen" class="screen">
    <div class="title">The Dark Wins</div>
    <div class="stats">
      Spirits banished
      <span class="big" id="final-score">0</span>
      <div class="best" id="best-line">Best: 0</div>
    </div>
    <button class="btn" id="retry-btn">Light Again</button>
  </div>

  <div class="flash" id="flash"></div>

<script>
/* ---------- Orientation ---------- */
const ORIENTATION = 'PORTRAIT';

function checkOrientation() {
  const isPortrait = window.innerHeight > window.innerWidth;
  const wrong = (ORIENTATION === 'PORTRAIT' && !isPortrait) ||
                (ORIENTATION === 'LANDSCAPE' && isPortrait);

  let overlay = document.getElementById('orientation-overlay');
  if (!overlay) {
    overlay = document.createElement('div');
    overlay.id = 'orientation-overlay';
    overlay.style.cssText = `
      display:none; position:fixed; inset:0; z-index:9999;
      background:#000; color:#fff; flex-direction:column;
      align-items:center; justify-content:center;
      font-family:sans-serif; font-size:1.2rem; text-align:center; gap:1rem;
    `;
    overlay.innerHTML = `
      <div style="font-size:3rem">📱</div>
      <div>Please rotate your device</div>
      <div style="font-size:0.85rem;opacity:0.6;">${ORIENTATION === 'PORTRAIT' ? 'This game is best played upright' : 'This game is best played sideways'}</div>
    `;
    document.body.appendChild(overlay);
  }
  overlay.style.display = wrong ? 'flex' : 'none';
}

window.addEventListener('resize', checkOrientation);
checkOrientation();

async function tryLockOrientation() {
  try {
    await document.documentElement.requestFullscreen?.();
    await screen.orientation?.lock?.(
      ORIENTATION === 'PORTRAIT' ? 'portrait' : 'landscape'
    );
  } catch (_) { /* not supported — overlay handles it */ }
}
document.addEventListener('pointerdown', tryLockOrientation, { once: true });

/* ---------- Canvas setup ---------- */
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let W = 0, H = 0, DPR = 1;

function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = Math.floor(W * DPR);
  canvas.height = Math.floor(H * DPR);
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  if (state !== 'title') layoutCandles();
}
window.addEventListener('resize', resize);

/* ---------- Game state ---------- */
let state = 'title'; // 'title' | 'playing' | 'gameOver'
let candles = [];
let ghosts = [];
let particles = [];
let embers = []; // background rising embers
let score = 0;
let wave = 1;
let waveTimer = 0;
let spawnTimer = 0;
let spawnInterval = 1.4; // seconds between spawns (shrinks over time)
let elapsed = 0;
let best = +(localStorage.getItem('candle-keeper-best') || 0);

const hud = document.getElementById('hud');
const hudScore = hud.querySelector('.score');
const hudWave = hud.querySelector('.wave');
const titleScreen = document.getElementById('title-screen');
const gameOverScreen = document.getElementById('game-over-screen');
const finalScoreEl = document.getElementById('final-score');
const bestLine = document.getElementById('best-line');
const flashEl = document.getElementById('flash');

document.getElementById('start-btn').addEventListener('click', startGame);
document.getElementById('retry-btn').addEventListener('click', startGame);

function layoutCandles() {
  const n = candles.length || 5;
  const marginSide = Math.max(30, W * 0.08);
  const spacing = (W - marginSide * 2) / (n - 1);
  const baseY = H - Math.max(90, H * 0.14);
  for (let i = 0; i < n; i++) {
    if (!candles[i]) {
      candles[i] = { lit: true, flicker: Math.random() * Math.PI * 2 };
    }
    candles[i].x = marginSide + spacing * i;
    candles[i].y = baseY;
  }
}

function startGame() {
  titleScreen.classList.remove('visible');
  gameOverScreen.classList.remove('visible');
  hud.classList.remove('hidden');

  state = 'playing';
  score = 0;
  wave = 1;
  waveTimer = 0;
  elapsed = 0;
  spawnTimer = 0.5;
  spawnInterval = 1.4;
  ghosts = [];
  particles = [];
  candles = [];
  for (let i = 0; i < 5; i++) {
    candles.push({ lit: true, flicker: Math.random() * Math.PI * 2 });
  }
  layoutCandles();
  updateHud();
}

function endGame() {
  state = 'gameOver';
  hud.classList.add('hidden');
  finalScoreEl.textContent = score;
  if (score > best) {
    best = score;
    localStorage.setItem('candle-keeper-best', String(best));
  }
  bestLine.textContent = 'Best: ' + best;
  setTimeout(() => gameOverScreen.classList.add('visible'), 600);
}

function updateHud() {
  hudScore.textContent = score;
  hudWave.textContent = 'Wave ' + wave;
}

/* ---------- Ghost factory ---------- */
const GHOST_TYPES = {
  white:  { hp: 1, speed: 35, radius: 36, palette: ['#ffffff', '#d0bfea'], eye: '#3a1c66' },
  red:    { hp: 1, speed: 75, radius: 32, palette: ['#ff8080', '#7a1a25'], eye: '#ffe0b0' },
  blue:   { hp: 2, speed: 30, radius: 42, palette: ['#b0dcff', '#1a3d7a'], eye: '#ffee99' },
  green:  { hp: 1, speed: 40, radius: 40, palette: ['#c8ffc0', '#1f7a3a'], eye: '#fff7a8', splits: true },
  small:  { hp: 1, speed: 55, radius: 26, palette: ['#c8ffc0', '#1f7a3a'], eye: '#fff7a8' }
};

function pickGhostType() {
  // Weighted random. As waves progress, tougher ghosts more common.
  const w = wave;
  const weights = [
    { t: 'white', w: Math.max(1, 7 - w * 0.4) },
    { t: 'red',   w: 0.5 + w * 0.35 },
    { t: 'blue',  w: w > 2 ? 1 + (w - 2) * 0.35 : 0 },
    { t: 'green', w: w > 3 ? 0.8 + (w - 3) * 0.3 : 0 },
  ].filter(e => e.w > 0);
  const sum = weights.reduce((s, e) => s + e.w, 0);
  let r = Math.random() * sum;
  for (const e of weights) { r -= e.w; if (r <= 0) return e.t; }
  return 'white';
}

function spawnGhost(atX, atY, type) {
  type = type || pickGhostType();
  const T = GHOST_TYPES[type];
  let x, y;
  if (atX !== undefined) {
    x = atX; y = atY;
  } else {
    // spawn from top or upper sides
    const edge = Math.random();
    const padTop = 80;
    if (edge < 0.6) {
      x = 40 + Math.random() * (W - 80);
      y = -T.radius - 20;
    } else if (edge < 0.8) {
      x = -T.radius - 10;
      y = padTop + Math.random() * (H * 0.45);
    } else {
      x = W + T.radius + 10;
      y = padTop + Math.random() * (H * 0.45);
    }
  }
  const lit = candles.filter(c => c.lit);
  if (lit.length === 0) return;
  const target = lit[Math.floor(Math.random() * lit.length)];
  // Speed scales slightly with wave
  const speedMul = 1 + (wave - 1) * 0.07;
  ghosts.push({
    type,
    x, y,
    r: T.radius,
    hp: T.hp,
    maxHp: T.hp,
    speed: T.speed * speedMul * (0.9 + Math.random() * 0.2),
    target,
    wobble: Math.random() * Math.PI * 2,
    wobbleAmp: 6 + Math.random() * 6,
    born: elapsed,
    dying: 0,
    hit: 0
  });
}

/* ---------- Particles ---------- */
function burstParticles(x, y, color, count = 14) {
  for (let i = 0; i < count; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = 60 + Math.random() * 180;
    particles.push({
      x, y,
      vx: Math.cos(a) * s,
      vy: Math.sin(a) * s,
      life: 0.5 + Math.random() * 0.4,
      age: 0,
      size: 2 + Math.random() * 3,
      color
    });
  }
}

function smokeParticles(x, y) {
  for (let i = 0; i < 10; i++) {
    particles.push({
      x: x + (Math.random() - 0.5) * 10,
      y: y + (Math.random() - 0.5) * 6,
      vx: (Math.random() - 0.5) * 20,
      vy: -30 - Math.random() * 50,
      life: 1.0 + Math.random() * 0.6,
      age: 0,
      size: 6 + Math.random() * 6,
      color: 'rgba(180,180,200,',
      smoke: true
    });
  }
}

function emberPuff(x, y) {
  for (let i = 0; i < 6; i++) {
    particles.push({
      x: x + (Math.random() - 0.5) * 6,
      y: y,
      vx: (Math.random() - 0.5) * 30,
      vy: -40 - Math.random() * 60,
      life: 0.6 + Math.random() * 0.4,
      age: 0,
      size: 1.5 + Math.random() * 1.5,
      color: 'ember'
    });
  }
}

/* ---------- Input ---------- */
canvas.addEventListener('pointerdown', (e) => {
  if (state !== 'playing') return;
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  handleTap(x, y);
});

function handleTap(x, y) {
  // Hit detection — prioritize the frontmost (latest-born, largest) match to avoid whiffs
  let hitIndex = -1;
  let hitDist = Infinity;
  for (let i = ghosts.length - 1; i >= 0; i--) {
    const g = ghosts[i];
    if (g.dying > 0) continue;
    const hitR = g.r + 8; // forgiving tap target
    const d = Math.hypot(g.x - x, g.y - y);
    if (d <= hitR && d < hitDist) {
      hitDist = d;
      hitIndex = i;
    }
  }
  if (hitIndex === -1) return;
  const g = ghosts[hitIndex];
  g.hp -= 1;
  g.hit = 0.12;
  if (g.hp <= 0) {
    const T = GHOST_TYPES[g.type];
    burstParticles(g.x, g.y, T.palette[0]);
    if (T.splits) {
      // split into two small ghosts
      for (let i = 0; i < 2; i++) {
        const offset = (i === 0 ? -1 : 1) * 22;
        const sx = g.x + offset;
        const sy = g.y;
        spawnGhost(sx, sy, 'small');
      }
    }
    g.dying = 0.25;
    score += T.splits ? 2 : (g.type === 'blue' ? 3 : (g.type === 'red' ? 2 : 1));
    updateHud();
  }
}

/* ---------- Update loop ---------- */
let lastT = 0;
function loop(t) {
  requestAnimationFrame(loop);
  const now = t / 1000;
  let dt = now - lastT;
  lastT = now;
  if (dt > 0.05) dt = 0.05;
  if (dt < 0) dt = 0;

  updateEmbers(dt);
  if (state === 'playing') updateGame(dt);
  updateParticles(dt);
  render();
}
requestAnimationFrame((t) => { lastT = t / 1000; loop(t); });

function updateGame(dt) {
  elapsed += dt;
  waveTimer += dt;

  // wave progression every 18 seconds
  if (waveTimer > 18) {
    waveTimer = 0;
    wave++;
    spawnInterval = Math.max(0.45, spawnInterval * 0.85);
    updateHud();
  }

  spawnTimer -= dt;
  if (spawnTimer <= 0) {
    spawnGhost();
    spawnTimer = spawnInterval * (0.7 + Math.random() * 0.7);
  }

  // update ghosts
  for (let i = ghosts.length - 1; i >= 0; i--) {
    const g = ghosts[i];
    if (g.dying > 0) {
      g.dying -= dt;
      if (g.dying <= 0) ghosts.splice(i, 1);
      continue;
    }
    // retarget if candle is out
    if (!g.target || !g.target.lit) {
      const lit = candles.filter(c => c.lit);
      if (lit.length === 0) { ghosts.splice(i, 1); continue; }
      g.target = lit[Math.floor(Math.random() * lit.length)];
    }
    const dx = g.target.x - g.x;
    const dy = (g.target.y - 28) - g.y;
    const d = Math.hypot(dx, dy) || 1;
    g.x += (dx / d) * g.speed * dt;
    g.y += (dy / d) * g.speed * dt;
    g.wobble += dt * 3;
    if (g.hit > 0) g.hit = Math.max(0, g.hit - dt);

    if (d < g.r - 4) {
      // Reached candle
      extinguishCandle(g.target);
      const T = GHOST_TYPES[g.type];
      burstParticles(g.x, g.y, T.palette[1]);
      g.dying = 0.2;
    }
  }

  // Remove ghosts when game over
  const litCount = candles.filter(c => c.lit).length;
  if (litCount === 0 && state === 'playing') {
    endGame();
  }
}

function extinguishCandle(c) {
  if (!c.lit) return;
  c.lit = false;
  smokeParticles(c.x, c.y - 30);
  flashEl.classList.add('show');
  setTimeout(() => flashEl.classList.remove('show'), 180);
  // Haptic feedback if available
  try { navigator.vibrate?.(60); } catch(_) {}
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.age += dt;
    if (p.age >= p.life) { particles.splice(i, 1); continue; }
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += (p.smoke ? -20 : 300) * dt;
    p.vx *= 0.98;
  }
}

function updateEmbers(dt) {
  // spawn a few embers drifting up
  if (Math.random() < 0.4) {
    embers.push({
      x: Math.random() * W,
      y: H + 5,
      vx: (Math.random() - 0.5) * 12,
      vy: -20 - Math.random() * 30,
      life: 5 + Math.random() * 3,
      age: 0,
      size: 1 + Math.random() * 1.5,
      twinkle: Math.random() * Math.PI * 2
    });
  }
  for (let i = embers.length - 1; i >= 0; i--) {
    const e = embers[i];
    e.age += dt;
    if (e.age >= e.life || e.y < -20) { embers.splice(i, 1); continue; }
    e.x += e.vx * dt;
    e.y += e.vy * dt;
    e.twinkle += dt * 4;
  }
}

/* ---------- Render ---------- */
function render() {
  // background gradient
  const bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, '#0a0414');
  bg.addColorStop(0.55, '#140725');
  bg.addColorStop(1, '#1d0a1a');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // moon glow
  const moonX = W * 0.78;
  const moonY = H * 0.18;
  const moonR = Math.min(W, H) * 0.09;
  const mg = ctx.createRadialGradient(moonX, moonY, 0, moonX, moonY, moonR * 4);
  mg.addColorStop(0, 'rgba(255, 220, 190, 0.5)');
  mg.addColorStop(0.3, 'rgba(120, 80, 140, 0.25)');
  mg.addColorStop(1, 'rgba(120, 80, 140, 0)');
  ctx.fillStyle = mg;
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#fff3d8';
  ctx.beginPath();
  ctx.arc(moonX, moonY, moonR, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = 'rgba(20, 10, 30, 0.55)';
  ctx.beginPath();
  ctx.arc(moonX - moonR * 0.35, moonY - moonR * 0.15, moonR * 0.85, 0, Math.PI * 2);
  ctx.fill();

  // distant mansion silhouette
  drawMansion();

  // floor
  const floorY = H - Math.max(50, H * 0.075);
  const floorGrad = ctx.createLinearGradient(0, floorY, 0, H);
  floorGrad.addColorStop(0, '#2a1330');
  floorGrad.addColorStop(1, '#0a0412');
  ctx.fillStyle = floorGrad;
  ctx.fillRect(0, floorY, W, H - floorY);

  // embers (background)
  for (const e of embers) {
    const alpha = Math.max(0, 1 - e.age / e.life);
    const twinkle = 0.6 + 0.4 * Math.sin(e.twinkle);
    ctx.fillStyle = `rgba(255, 170, 60, ${alpha * twinkle})`;
    ctx.beginPath();
    ctx.arc(e.x, e.y, e.size, 0, Math.PI * 2);
    ctx.fill();
  }

  // candles
  for (const c of candles) drawCandle(c);

  // ghosts
  for (const g of ghosts) drawGhost(g);

  // particles
  for (const p of particles) {
    const t = p.age / p.life;
    const alpha = 1 - t;
    if (p.color === 'ember') {
      ctx.fillStyle = `rgba(255, ${150 + Math.floor(80 * alpha)}, 40, ${alpha})`;
    } else if (p.smoke) {
      ctx.fillStyle = `${p.color}${alpha * 0.4})`;
    } else {
      ctx.fillStyle = hexToRgba(p.color, alpha);
    }
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * (p.smoke ? (1 + t * 1.5) : (1 - t * 0.5)), 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawMansion() {
  const baseY = H - Math.max(55, H * 0.08);
  ctx.fillStyle = 'rgba(6, 2, 14, 0.78)';
  const mW = W * 0.9;
  const mH = Math.min(H * 0.22, 200);
  const x0 = W * 0.05;
  const y0 = baseY - mH;
  ctx.beginPath();
  ctx.moveTo(x0, baseY);
  ctx.lineTo(x0, y0 + mH * 0.5);
  ctx.lineTo(x0 + mW * 0.18, y0 + mH * 0.5);
  ctx.lineTo(x0 + mW * 0.25, y0 + mH * 0.1);
  ctx.lineTo(x0 + mW * 0.32, y0 + mH * 0.5);
  ctx.lineTo(x0 + mW * 0.45, y0 + mH * 0.5);
  ctx.lineTo(x0 + mW * 0.5, y0);
  ctx.lineTo(x0 + mW * 0.55, y0 + mH * 0.5);
  ctx.lineTo(x0 + mW * 0.68, y0 + mH * 0.5);
  ctx.lineTo(x0 + mW * 0.75, y0 + mH * 0.1);
  ctx.lineTo(x0 + mW * 0.82, y0 + mH * 0.5);
  ctx.lineTo(x0 + mW, y0 + mH * 0.5);
  ctx.lineTo(x0 + mW, baseY);
  ctx.closePath();
  ctx.fill();

  // windows with faint glow
  ctx.fillStyle = 'rgba(255, 190, 90, 0.25)';
  const winYs = [y0 + mH * 0.65, y0 + mH * 0.82];
  const winXs = [0.1, 0.22, 0.4, 0.58, 0.72, 0.88];
  for (const wy of winYs) {
    for (const wxr of winXs) {
      ctx.fillRect(x0 + mW * wxr, wy, 10, 14);
    }
  }
}

function drawCandle(c) {
  const cx = c.x;
  const base = c.y;
  const bodyH = 52;
  const bodyW = 16;
  // holder
  ctx.fillStyle = '#3a2a1a';
  ctx.beginPath();
  ctx.ellipse(cx, base + 16, bodyW + 10, 6, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#5e3a1f';
  ctx.fillRect(cx - bodyW - 6, base + 10, (bodyW + 6) * 2, 10);

  // wax body
  const waxGrad = ctx.createLinearGradient(cx - bodyW, 0, cx + bodyW, 0);
  waxGrad.addColorStop(0, '#d8c079');
  waxGrad.addColorStop(0.5, '#fbe7a3');
  waxGrad.addColorStop(1, '#b79a4d');
  ctx.fillStyle = waxGrad;
  ctx.fillRect(cx - bodyW / 2, base - bodyH + 10, bodyW, bodyH);
  // top
  ctx.beginPath();
  ctx.ellipse(cx, base - bodyH + 10, bodyW / 2, 4, 0, 0, Math.PI * 2);
  ctx.fill();

  // wick
  ctx.strokeStyle = '#2a1a08';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(cx, base - bodyH + 10);
  ctx.lineTo(cx, base - bodyH);
  ctx.stroke();

  if (c.lit) {
    c.flicker += 0.18 + Math.random() * 0.05;
    const flick = Math.sin(c.flicker * 2) * 0.5 + Math.sin(c.flicker * 3.7) * 0.3;
    const flameH = 22 + flick * 3;
    const flameW = 9 + Math.sin(c.flicker * 5) * 1.1;
    const flameY = base - bodyH - flameH / 2 + 4;

    // outer glow
    const glow = ctx.createRadialGradient(cx, flameY + 4, 2, cx, flameY + 4, 55);
    glow.addColorStop(0, 'rgba(255, 210, 120, 0.9)');
    glow.addColorStop(0.35, 'rgba(255, 140, 50, 0.4)');
    glow.addColorStop(1, 'rgba(255, 80, 20, 0)');
    ctx.fillStyle = glow;
    ctx.fillRect(cx - 60, flameY - 50, 120, 110);

    // flame outer
    ctx.fillStyle = '#ff9a3c';
    ctx.beginPath();
    ctx.ellipse(cx, flameY, flameW, flameH / 2, 0, 0, Math.PI * 2);
    ctx.fill();
    // flame inner
    ctx.fillStyle = '#ffd86a';
    ctx.beginPath();
    ctx.ellipse(cx, flameY + 2, flameW * 0.55, flameH * 0.35, 0, 0, Math.PI * 2);
    ctx.fill();
    // core
    ctx.fillStyle = '#fff3c2';
    ctx.beginPath();
    ctx.ellipse(cx, flameY + 3, flameW * 0.25, flameH * 0.18, 0, 0, Math.PI * 2);
    ctx.fill();

    if (Math.random() < 0.25) emberPuff(cx, flameY - flameH / 2);
  } else {
    // extinguished: dark wick tip
    ctx.fillStyle = '#1a0d05';
    ctx.beginPath();
    ctx.arc(cx, base - bodyH - 1, 1.6, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawGhost(g) {
  const T = GHOST_TYPES[g.type];
  const wobX = Math.sin(g.wobble) * g.wobbleAmp * 0.4;
  const bx = g.x + wobX;
  const by = g.y;
  const r = g.r * (g.dying > 0 ? 1 + (0.25 - g.dying) * 2 : 1) * (g.hit > 0 ? 1.08 : 1);
  const alpha = g.dying > 0 ? Math.max(0, g.dying / 0.25) : 1;

  ctx.save();
  ctx.globalAlpha = alpha;

  // ghost body shape (blob)
  const grad = ctx.createRadialGradient(bx - r * 0.3, by - r * 0.35, r * 0.1, bx, by, r);
  grad.addColorStop(0, T.palette[0]);
  grad.addColorStop(1, T.palette[1]);
  ctx.fillStyle = grad;

  ctx.beginPath();
  ctx.moveTo(bx - r, by);
  ctx.bezierCurveTo(bx - r, by - r * 1.3, bx + r, by - r * 1.3, bx + r, by);
  // wavy bottom
  const waves = 4;
  const segW = (r * 2) / waves;
  const waveAmp = 5 + Math.sin(g.wobble * 1.5) * 2;
  for (let i = 0; i < waves; i++) {
    const wx = bx + r - (i + 0.5) * segW;
    const wy = by + (i % 2 === 0 ? waveAmp : -2);
    ctx.quadraticCurveTo(wx + segW * 0.25, wy + 6, wx, by);
  }
  ctx.closePath();

  // outer glow
  ctx.shadowColor = T.palette[0];
  ctx.shadowBlur = g.hit > 0 ? 30 : 16;
  ctx.fill();
  ctx.shadowBlur = 0;

  // eyes
  const eyeGap = r * 0.4;
  const eyeY = by - r * 0.2;
  const eyeR = Math.max(3, r * 0.12);
  ctx.fillStyle = T.eye;
  ctx.beginPath();
  ctx.arc(bx - eyeGap, eyeY, eyeR, 0, Math.PI * 2);
  ctx.arc(bx + eyeGap, eyeY, eyeR, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = 'rgba(0,0,0,0.65)';
  ctx.beginPath();
  ctx.arc(bx - eyeGap + 1, eyeY + 1, eyeR * 0.55, 0, Math.PI * 2);
  ctx.arc(bx + eyeGap + 1, eyeY + 1, eyeR * 0.55, 0, Math.PI * 2);
  ctx.fill();

  // little mouth
  ctx.fillStyle = 'rgba(40, 10, 30, 0.7)';
  ctx.beginPath();
  ctx.ellipse(bx, by + r * 0.12, r * 0.12, r * 0.18, 0, 0, Math.PI * 2);
  ctx.fill();

  // HP pip for blue (2 HP) to show durability
  if (g.maxHp > 1 && g.dying === 0) {
    const pipY = by - r - 12;
    for (let i = 0; i < g.maxHp; i++) {
      const px = bx - (g.maxHp - 1) * 5 + i * 10;
      ctx.fillStyle = i < g.hp ? '#ffcf66' : 'rgba(255,255,255,0.22)';
      ctx.beginPath();
      ctx.arc(px, pipY, 3, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  ctx.restore();
}

function hexToRgba(hex, a) {
  let h = hex.replace('#', '');
  if (h.length === 3) h = h.split('').map(c => c + c).join('');
  const r = parseInt(h.substring(0, 2), 16);
  const g = parseInt(h.substring(2, 4), 16);
  const b = parseInt(h.substring(4, 6), 16);
  return `rgba(${r}, ${g}, ${b}, ${a})`;
}

/* ---------- Init ---------- */
resize();
</script>
