<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>One AI Game a Day</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f0f0f;
      color: #f0f0f0;
      font-family: system-ui, sans-serif;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    header h1 {
      font-size: 2rem;
      letter-spacing: 0.05em;
    }

    header p {
      color: #888;
      margin-top: 0.4rem;
      font-size: 0.95rem;
    }

    #game-list {
      max-width: 600px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .game-card {
      display: block;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 1.2rem 1.5rem;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.15s, background 0.15s;
    }

    .game-card:hover {
      border-color: #555;
      background: #222;
    }

    .game-card .name {
      font-size: 1.1rem;
      font-weight: 600;
    }

    .game-card .meta {
      margin-top: 0.3rem;
      font-size: 0.8rem;
      color: #666;
      display: flex;
      gap: 0.75rem;
    }

    .game-card .genre {
      background: #2a2a2a;
      border-radius: 4px;
      padding: 0.1rem 0.5rem;
      color: #aaa;
    }

    .game-card .orientation {
      margin-left: auto;
      font-size: 1rem;
      opacity: 0.4;
    }

    #empty {
      text-align: center;
      color: #555;
      margin-top: 4rem;
      font-size: 1rem;
    }

    #error {
      text-align: center;
      color: #c0392b;
      margin-top: 4rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>One AI Game a Day</h1>
    <p>A new game prototype, every single day.</p>
  </header>

  <div id="game-list"></div>

  <script>
    async function loadGames() {
      const list = document.getElementById('game-list');
      try {
        const res = await fetch('games/manifest.json');
        const { games } = await res.json();

        if (!games.length) {
          list.innerHTML = '<p id="empty">No games yet — check back tomorrow!</p>';
          return;
        }

        const sorted = [...games].sort((a, b) => b.date.localeCompare(a.date));

        list.innerHTML = sorted.map(g => `
          <a class="game-card" href="games/${g.date}/index.html">
            <div class="name">${g.name}</div>
            <div class="meta">
              <span>${formatDate(g.date)}</span>
              ${g.genre ? `<span class="genre">${g.genre}</span>` : ''}
              ${g.theme ? `<span>${g.theme}</span>` : ''}
              ${g.orientation ? `<span class="orientation" title="${g.orientation}">${g.orientation === 'LANDSCAPE' ? '🔄' : '📱'}</span>` : ''}
            </div>
          </a>
        `).join('');
      } catch (e) {
        list.innerHTML = '<p id="error">Failed to load games.</p>';
      }
    }

    function formatDate(dateStr) {
      const [y, m, d] = dateStr.split('-').map(Number);
      return new Date(y, m - 1, d).toLocaleDateString('en-US', {
        year: 'numeric', month: 'short', day: 'numeric'
      });
    }

    loadGames();
  </script>
</body>
</html>
